<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жЬђжЧ•гБЃеЗЇиµ∞и°® | BOATRACE гГЗгГЉгВњгГЭгГЉгВњгГЂ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b1219; color:#e0e6ed; font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif; padding-bottom:60px; }
.wrap { max-width:640px; margin:0 auto; padding:14px 12px; }
header h1 { font-size:20px; color:#ffd166; letter-spacing:1px; }
header .sub { font-size:11px; color:#8a94a3; margin-top:4px; }
.crumb { font-size:12px; color:#8a94a3; margin:10px 0 6px; }
.crumb a { color:#ffd166; text-decoration:none; }

/* е†ігВЂгГЉгГЙ */
.venue-card { background:#121c28; border:1px solid #1f2b3a; border-radius:10px; padding:12px 14px; margin-top:10px; cursor:pointer; display:flex; align-items:center; gap:12px; }
.venue-card:active { background:#182535; }
.venue-name { font-size:17px; font-weight:bold; color:#fff; min-width:64px; }
.venue-meta { flex:1; font-size:11px; color:#9fb0c3; line-height:1.6; }
.venue-day { font-size:11px; color:#ffd166; border:1px solid #ffd16655; border-radius:4px; padding:1px 6px; white-space:nowrap; }

/* RгВ∞гГ™гГГгГЙ */
.rgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
.rbtn { background:#121c28; border:1px solid #1f2b3a; border-radius:8px; padding:8px 4px; text-align:center; cursor:pointer; }
.rbtn:active { background:#182535; }
.rbtn .rno { font-size:16px; font-weight:bold; color:#fff; }
.rbtn .dl { font-size:10px; color:#8a94a3; margin-top:2px; }
.rbtn.closed { opacity:.38; }
.rbtn.closed .rno { color:#8a94a3; }

/* гГђгГЉгВєгГШгГГгГА */
.race-head { background:#121c28; border:1px solid #1f2b3a; border-radius:10px; padding:12px 14px; margin-top:10px; }
.race-head .line1 { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.race-head .rt { font-size:18px; font-weight:bold; color:#ffd166; }
.race-head .kikaku { font-size:13px; color:#e0e6ed; }
.race-head .dl { font-size:12px; color:#9fb0c3; margin-top:4px; }

/* жГЕе†±гГСгГНгГЂпЉИиНТгВМгГїйҐ®пЉЙ */
.panel { border-radius:10px; padding:10px 12px; margin-top:8px; font-size:12px; line-height:1.7; }
.panel .ttl { font-size:12px; font-weight:bold; margin-bottom:2px; }
.panel-arare { background:#231a12; border:1px solid #4a370f; }
.panel-arare .ttl { color:#ffd166; }
.panel-arare ul { margin:2px 0 0 16px; color:#d8c9a5; }
.panel-wind { background:#0f1e2b; border:1px solid #1c3a52; color:#a9c6dd; }
.panel-wind .ttl { color:#7ec8ff; }
.lv-йЂШ { color:#ff6b6b; font-weight:bold; }
.lv-дЄ≠ { color:#ffd166; font-weight:bold; }
.lv-дљО { color:#69db7c; font-weight:bold; }

/* иЙЗгВЂгГЉгГЙ */
.boat { background:#121c28; border:1px solid #1f2b3a; border-radius:10px; margin-top:8px; display:flex; overflow:hidden; }
.lane-bar { width:8px; flex:none; }
.boat-body { flex:1; padding:9px 12px; }
.boat-top { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.lane-num { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; flex:none; }
.klass { font-size:11px; font-weight:bold; border-radius:4px; padding:1px 6px; color:#fff; flex:none; }
.k-A1 { background:#c9184a; } .k-A2 { background:#e07a1f; } .k-B1 { background:#1d6fd6; } .k-B2 { background:#5c6773; }
.pname { font-size:16px; font-weight:bold; color:#fff; }
.badge-local { font-size:10px; color:#0b1219; background:#ffd166; border-radius:4px; padding:1px 5px; font-weight:bold; flex:none; }
.badge-f { font-size:10px; color:#fff; background:#c9184a; border-radius:4px; padding:1px 5px; font-weight:bold; flex:none; }
.boat-sub { font-size:11px; color:#8a94a3; margin-top:2px; }
.stats { display:flex; gap:10px; margin-top:7px; flex-wrap:wrap; }
.stat { line-height:1.35; min-width:70px; }
.stat .lb { font-size:10px; color:#8a94a3; }
.stat .v { font-size:15px; font-weight:bold; color:#e0e6ed; }
.stat .v2 { font-size:11px; color:#9fb0c3; }
.stat.hot .v { color:#ffd166; }
.stat.hot .lb { color:#ffd166; }
.stat.mach .lb { color:#7ec8ff; }
.stat.mach .v { color:#a9c6dd; }
.up { font-size:11px; }
.empty { text-align:center; color:#8a94a3; font-size:13px; padding:40px 0; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>жЬђжЧ•гБЃеЗЇиµ∞и°®</h1>
  <div class="sub" id="updated"></div>
</header>
<div class="crumb" id="crumb"></div>
<div id="app"><div class="empty">и™≠гБњиЊЉгБњдЄ≠вА¶</div></div>
</div>

<script>
var RAW = __DATA_PLACEHOLDER__;

/* е†ігБЃжЙАеЬ®жФѓйГ®пЉИеЬ∞еЕГгГРгГГгВЄеИ§еЃЪзФ®гГїеЫЇеЃЪжГЕе†±пЉЙ */
var HOME_BRANCH = {"01":"зЊ§й¶ђ","02":"еЯЉзОЙ","03":"жЭ±дЇђ","04":"жЭ±дЇђ","05":"жЭ±дЇђ","06":"йЭЩе≤°","07":"жДЫзЯ•","08":"жДЫзЯ•","09":"дЄЙйЗН","10":"з¶ПдЇХ","11":"жїЛи≥А","12":"е§ІйШ™","13":"еЕµеЇЂ","14":"еЊ≥е≥ґ","15":"й¶ЩеЈЭ","16":"е≤°е±±","17":"еЇГе≥ґ","18":"е±±еП£","19":"е±±еП£","20":"з¶Пе≤°","21":"з¶Пе≤°","22":"з¶Пе≤°","23":"дљРи≥А","24":"йХЈеіО"};
var LANE_COLOR = {1:["#ffffff","#111111"],2:["#15181c","#ffffff"],3:["#e63946","#ffffff"],4:["#1d6fd6","#ffffff"],5:["#f2c94c","#111111"],6:["#27ae60","#ffffff"]};

var col = {}; RAW.columns.forEach(function(c,i){ col[c]=i; });
function g(row,name){ var i=col[name]; return i===undefined ? "" : String(row[i]==null?"":row[i]); }

/* е†ігБФгБ®гБЂжХізРЖ */
var venues = {}; /* jcd -> {name, setsumei, hiome, races: {rno -> {deadline, kikaku, boats:[]}}} */
RAW.data.forEach(function(row){
  var jcd=g(row,"е†ігВ≥гГЉгГЙ"), name=g(row,"е†іеРН");
  if(!venues[jcd]) venues[jcd]={name:name, setsu:g(row,"зѓАеРН"), day:g(row,"жЧ•зЫЃ"), hd:g(row,"йЦЛеВђжЧ•"), races:{}};
  var rno=parseInt(g(row,"гГђгГЉгВє"));
  if(!venues[jcd].races[rno]) venues[jcd].races[rno]={deadline:g(row,"зЈ†еИЗжЩВеИї"), kikaku:g(row,"дЉБзФїеРН"), boats:[]};
  venues[jcd].races[rno].boats.push(row);
});
Object.keys(venues).forEach(function(j){
  Object.keys(venues[j].races).forEach(function(r){
    venues[j].races[r].boats.sort(function(a,b){ return parseInt(g(a,"жЮ†"))-parseInt(g(b,"жЮ†")); });
  });
});

var arare=null, weather=null;
fetch("../data/arare.json").then(function(r){return r.json();}).then(function(j){arare=j; rerender();}).catch(function(){});
fetch("../data/weather.json").then(function(r){return r.json();}).then(function(j){weather=j; rerender();}).catch(function(){});

var view={page:"venues", jcd:null, rno:null};
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nowJST(){ return new Date(Date.now()+9*3600*1000); } /* UTCеЯЇжЇЦгБЂJSTгВ™гГХгВїгГГгГИгВТиґ≥гБЧgetUTCз≥їгБІи™≠гВА */
function isClosed(hd,dl){
  if(!dl||!/^\d{1,2}:\d{2}$/.test(dl)||!/^\d{8}$/.test(hd)) return false;
  var n=nowJST();
  var cur=n.getUTCFullYear()*1e4+(n.getUTCMonth()+1)*100+n.getUTCDate();
  var h=parseInt(dl.split(":")[0]), m=parseInt(dl.split(":")[1]);
  if(cur>parseInt(hd)) return true;
  if(cur<parseInt(hd)) return false;
  return (n.getUTCHours()*60+n.getUTCMinutes()) > (h*60+m);
}
function fmtNum(s){ var f=parseFloat(s); return isNaN(f)?"-":f.toFixed(2); }
function fmtPct(s){ var f=parseFloat(s); return isNaN(f)?"-":f.toFixed(1)+"%"; }

function findArare(jcd,rno){
  if(!arare||!arare.races) return null;
  var hit=null;
  Object.keys(arare.races).forEach(function(k){
    var r=arare.races[k];
    if(String(r.jcd)===String(jcd) && parseInt(r.rno)===parseInt(rno)) hit=r;
  });
  return hit;
}
function findWind(jcd,hd,dl){
  if(!weather||!weather.stadiums||!weather.stadiums[jcd]) return null;
  if(!/^\d{8}$/.test(hd)||!/^\d{1,2}:\d{2}$/.test(dl)) return null;
  var target=hd.slice(0,4)+"-"+hd.slice(4,6)+"-"+hd.slice(6,8)+"T"+("0"+dl).slice(-5);
  var tms=Date.parse(target+"+09:00");
  var best=null, bd=1e15;
  (weather.stadiums[jcd].hourly||[]).forEach(function(h){
    var t=Date.parse(h.time+"+09:00");
    var d=Math.abs(t-tms);
    if(d<bd){ bd=d; best=h; }
  });
  return best;
}

function render(){
  var app=document.getElementById("app"), crumb=document.getElementById("crumb");
  document.getElementById("updated").textContent="жЫіжЦ∞: "+(RAW.updated||"-")+"пљЬеЗЇеЕЄ: BOATRACEеЕђеЉПеЗЇиµ∞и°®";
  var jcds=Object.keys(venues).sort();
  if(jcds.length===0){ app.innerHTML='<div class="empty">жЬђжЧ•гБЃеЗЇиµ∞и°®гГЗгГЉгВњгБМгБВгВКгБЊгБЫгВУ</div>'; crumb.innerHTML=""; return; }

  if(view.page==="venues"){
    crumb.innerHTML="е†ігВТйБЄжКЮ";
    app.innerHTML=jcds.map(function(j){
      var v=venues[j];
      var rs=Object.keys(v.races).map(Number).sort(function(a,b){return a-b;});
      var first=v.races[rs[0]], last=v.races[rs[rs.length-1]];
      return '<div class="venue-card" data-j="'+j+'">'
        +'<div class="venue-name">'+esc(v.name)+'</div>'
        +'<div class="venue-meta">'+esc(v.setsu)+'<br>'+rs.length+'RпљЬ'+esc(first.deadline)+'гАЬ'+esc(last.deadline)+'</div>'
        +'<div class="venue-day">'+esc(v.day)+'</div></div>';
    }).join("");
    Array.prototype.forEach.call(app.querySelectorAll(".venue-card"),function(el){
      el.onclick=function(){ view={page:"races",jcd:el.getAttribute("data-j"),rno:null}; render(); window.scrollTo(0,0); };
    });
    return;
  }

  var v=venues[view.jcd];
  if(!v){ view={page:"venues"}; render(); return; }

  if(view.page==="races"){
    crumb.innerHTML='<a href="#" id="back">е†ідЄАи¶І</a> пЉЮ '+esc(v.name);
    var rs=Object.keys(v.races).map(Number).sort(function(a,b){return a-b;});
    app.innerHTML='<div class="rgrid">'+rs.map(function(r){
      var rc=v.races[r], cl=isClosed(v.hd,rc.deadline)?" closed":"";
      return '<div class="rbtn'+cl+'" data-r="'+r+'"><div class="rno">'+r+'R</div><div class="dl">'+esc(rc.deadline||"")+'</div></div>';
    }).join("")+'</div>';
    document.getElementById("back").onclick=function(e){ e.preventDefault(); view={page:"venues"}; render(); };
    Array.prototype.forEach.call(app.querySelectorAll(".rbtn"),function(el){
      el.onclick=function(){ view={page:"race",jcd:view.jcd,rno:parseInt(el.getAttribute("data-r"))}; render(); window.scrollTo(0,0); };
    });
    return;
  }

  /* page === race */
  var rc=v.races[view.rno];
  if(!rc){ view={page:"races",jcd:view.jcd}; render(); return; }
  crumb.innerHTML='<a href="#" id="back0">е†ідЄАи¶І</a> пЉЮ <a href="#" id="back1">'+esc(v.name)+'</a> пЉЮ '+view.rno+'R';

  var html='<div class="race-head"><div class="line1"><span class="rt">'+esc(v.name)+' '+view.rno+'R</span><span class="kikaku">'+esc(rc.kikaku)+'</span></div>'
    +'<div class="dl">зЈ†еИЗ '+esc(rc.deadline||"-")+'пљЬ'+esc(v.setsu)+' '+esc(v.day)+'</div></div>';

  var ar=findArare(view.jcd,view.rno);
  if(ar){
    html+='<div class="panel panel-arare"><div class="ttl">иНТгВМжМЗжХ∞ '+esc(ar.score)+'/'+esc((arare&&arare.max_score)||"-")+'пЉИ<span class="lv-'+esc(ar.level)+'">'+esc(ar.level)+'</span>пЉЙ</div>'
      +'<ul>'+(ar.factors||[]).map(function(f){return '<li>'+esc(f)+'</li>';}).join("")+'</ul></div>';
  }
  var wd=findWind(view.jcd,v.hd,rc.deadline);
  if(wd){
    html+='<div class="panel panel-wind"><div class="ttl">зЈ†еИЗжЩВеИїгБЃйҐ®дЇИе†±</div>'
      +esc(wd.dir)+' '+esc(wd.wind)+'mпљЬ'+esc(wd.wx)+'пЉИ'+esc(String(wd.time).replace("T"," ").slice(5))+' жЩВзВєгБЃдЇИе†±пЉЙ</div>';
  }

  html+=rc.boats.map(function(row){
    var lane=parseInt(g(row,"жЮ†"));
    var lc=LANE_COLOR[lane]||["#333","#fff"];
    var kl=g(row,"зіЪеИ•");
    var zk=parseFloat(g(row,"еЕ®еЫљеЛЭзОЗ")), tk=parseFloat(g(row,"ељУеЬ∞еЛЭзОЗ"));
    var hot=!isNaN(zk)&&!isNaN(tk)&&tk>zk;
    var fn=parseInt(g(row,"FжХ∞"))||0;
    var local=g(row,"жФѓйГ®")===HOME_BRANCH[view.jcd];
    var name=g(row,"ж∞ПеРН").replace(/гАА+/g,"гАА");
    var toban=g(row,"зЩїйМ≤зХ™еПЈ");
    return '<div class="boat"><div class="lane-bar" style="background:'+lc[0]+'"></div><div class="boat-body">'
      +'<div class="boat-top">'
      +'<span class="lane-num" style="background:'+lc[0]+';color:'+lc[1]+';'+(lane===1?'border:1px solid #445;':'')+(lane===2?'border:1px solid #445;':'')+'">'+lane+'</span>'
      +'<span class="klass k-'+esc(kl)+'">'+esc(kl)+'</span>'
      +(toban?'<a class="pname" href="../players/?toban='+esc(toban)+'" style="color:inherit;text-decoration:none;">'+esc(name)+'</a>':'<span class="pname">'+esc(name)+'</span>')
      +(local?'<span class="badge-local">еЬ∞еЕГ</span>':'')
      +(fn>0?'<span class="badge-f">F'+fn+'</span>':'')
      +'</div>'
      +'<div class="boat-sub">'+esc(g(row,"жФѓйГ®"))+'пЉП'+esc(g(row,"еЗЇиЇЂ"))+'гГї'+esc(g(row,"еєійљҐ"))+'ж≠≥пљЬеє≥еЭЗST '+esc(g(row,"еє≥еЭЗST")||"-")+'</div>'
      +'<div class="stats">'
      +'<div class="stat"><div class="lb">еЕ®еЫљеЛЭзОЗ</div><div class="v">'+fmtNum(g(row,"еЕ®еЫљеЛЭзОЗ"))+'</div><div class="v2">2йА£ '+fmtPct(g(row,"еЕ®еЫљ2йА£зОЗ"))+'</div></div>'
      +'<div class="stat'+(hot?' hot':'')+'"><div class="lb">ељУеЬ∞еЛЭзОЗ'+(hot?'<span class="up"> вЖС</span>':'')+'</div><div class="v">'+fmtNum(g(row,"ељУеЬ∞еЛЭзОЗ"))+'</div><div class="v2">2йА£ '+fmtPct(g(row,"ељУеЬ∞2йА£зОЗ"))+'</div></div>'
      +'<div class="stat mach"><div class="lb">гГҐгГЉгВњгГЉ'+(g(row,"гГҐгГЉгВњгГЉNo")?' No.'+esc(g(row,"гГҐгГЉгВњгГЉNo")):'')+'</div><div class="v">'+fmtPct(g(row,"гГҐгГЉгВњгГЉ2йА£зОЗ"))+'</div><div class="v2">3йА£ '+fmtPct(g(row,"гГҐгГЉгВњгГЉ3йА£зОЗ"))+'</div></div>'
      +'<div class="stat mach"><div class="lb">гГЬгГЉгГИ'+(g(row,"гГЬгГЉгГИNo")?' No.'+esc(g(row,"гГЬгГЉгГИNo")):'')+'</div><div class="v">'+fmtPct(g(row,"гГЬгГЉгГИ2йА£зОЗ"))+'</div><div class="v2">3йА£ '+fmtPct(g(row,"гГЬгГЉгГИ3йА£зОЗ"))+'</div></div>'
      +'</div></div></div>';
  }).join("");

  app.innerHTML=html;
  document.getElementById("back0").onclick=function(e){ e.preventDefault(); view={page:"venues"}; render(); };
  document.getElementById("back1").onclick=function(e){ e.preventDefault(); view={page:"races",jcd:view.jcd}; render(); };
}
function rerender(){ render(); }
render();
</script>
</body>
</html>
