name: レース結果 随時更新（日中）

# 当日分の確定レースを日中に随時取り込み、結果表ページを実質リアルタイム化する。
# 元データ BoatraceOpenAPI はレース確定ごとに更新されるため、1時間おきに当日分を
# 取得し直し、確定済みレースを順次 results/ と docs/results/data/ に反映する。
# 見立て検証(verifyPredictions 等)は夜の updateResults.yml に任せ、ここでは触れない。

on:
  schedule:
    # JST 11:15〜23:15 の毎時（UTC 02:15〜14:15）。デイ〜ナイター終了までをカバー。
    - cron: "15 2-14 * * *"
  workflow_dispatch:
    inputs:
      hd:
        description: "取得する日付(YYYYMMDD)。空欄なら当日(JST)。"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  # 夜の updateResults.yml と同一グループにして results/ への同時コミット衝突を防ぐ。
  group: boatrace-results
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build results (当日分・OpenAPI)
        run: python scripts/buildResults.py
        env:
          HD: ${{ github.event.inputs.hd }}

      - name: build results site data (docs/results/)
        run: python scripts/buildResultsSite.py

      - name: commit
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
          git add results/ 2>/dev/null || true
          git add docs/results/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: results live update"
          git push
