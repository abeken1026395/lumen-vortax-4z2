name: レース結果 随時更新（日中）

# 当日分の確定レースを日中に随時取り込み、結果表ページを実質リアルタイム化する。
# 元データ BoatraceOpenAPI はレース確定ごとに更新されるため、当日分を取得し直し、
# 確定済みレースを順次 results/ と docs/results/data/ に反映する。
# 見立て検証(verifyPredictions 等)は夜の updateResults.yml に任せ、ここでは触れない。
#
# 発火は二重化して取りこぼしを防ぐ:
#   1) schedule(毎時) … 主。ただし GitHub の schedule は遅延・スキップが起きやすい。
#   2) workflow_run … 既に高頻度で回る他ジョブ(気象=3時間毎/出走表/モーター/荒れ指数)の
#      完了に相乗り。schedule が不発でも、これらが走るたびに結果更新も走る。

on:
  schedule:
    # JST 11:15〜23:15 の毎時（UTC 02:15〜14:15）。デイ〜ナイター終了までをカバー。
    - cron: "15 2-14 * * *"
  workflow_run:
    # 高頻度で走る既存ジョブの完了に相乗りして発火機会を増やす(schedule 不発対策)。
    workflows:
      - "気象データ自動更新"
      - "出走表データ自動更新"
      - "モーターデータ自動更新"
      - "荒れ指数 更新"
    types:
      - completed
  workflow_dispatch:
    inputs:
      hd:
        description: "取得する日付(YYYYMMDD)。空欄なら当日(JST)。"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  # 夜の updateResults.yml と同一グループにして results/ への同時コミット衝突を防ぐ。
  group: boatrace-results
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: build results (当日分・OpenAPI)
        run: python scripts/buildResults.py
        env:
          HD: ${{ github.event.inputs.hd }}
          RESULTS_WINDOW: "1"   # liveは当日のみ(軽量・高頻度)。確定日の窓照合は夜のupdateResultsが担当。

      - name: build results site data (docs/results/)
        run: python scripts/buildResultsSite.py

      - name: commit
        if: always()
        env:
          BR: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/ docs/results/data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"; exit 0
          fi
          # 先にコミット（未コミット変更を残さない）→ autostash衝突でマーカーが混入する事故を防ぐ。
          git commit -m "auto: results live update"
          # 生成物はrun毎に取得時刻が変わるため既存コミットと必ず衝突する。
          # rebase(-X theirs=自分の再生成データを優先)で機械的に解消し、衝突マーカーは絶対にコミットしない。
          # push競合は指数的でなく短いランダム待機でリトライ。
          for i in 1 2 3 4 5 6; do
            git fetch origin "$BR" || true
            if git rebase -X theirs "origin/$BR"; then
              if git push origin "HEAD:$BR"; then
                echo "pushed (try $i)"; exit 0
              fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            sleep $(( (RANDOM % 6) + 3 ))
          done
          echo "push retries exhausted"; exit 1
