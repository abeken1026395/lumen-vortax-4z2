# 一時ワークフロー: Phase2(今節成績)の live 検証用。検証確定後に削除する。
name: verify phase2 (temporary)

on:
  push:
    branches:
      - claude/shussou-hyou-optimization-dtpkoe
    paths:
      - 'scripts/verify_phase2_live.py'
      - 'scripts/scrape_racers.py'
      - '.github/workflows/verify_phase2.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-verify-phase2
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/shussou-hyou-optimization-dtpkoe
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 pandas lxml
      - run: python scripts/verify_phase2_live.py
      - name: commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/_phase2_live_report.md
          git diff --staged --quiet && echo "no change" && exit 0
          git commit -m "verify phase2: live レポート更新 $(date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin claude/shussou-hyou-optimization-dtpkoe && \
            git push origin HEAD:claude/shussou-hyou-optimization-dtpkoe && break
            echo "push retry $i ..."
            sleep 5
          done
