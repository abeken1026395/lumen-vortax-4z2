name: E30選手別成績 更新

on:
  schedule:
    - cron: '0 16 * * *'   # JST 翌01:00（全レース確定・ミラー反映後）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-e30stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # 生データ集計。データ源=BoatraceOpenAPI/resultsミラー(GitHub配信,Actions到達可)
      # e30Schedule.json（確定10場）参照。標準ライブラリのみ＝pip不要。
      - run: python scripts/buildE30Stats.py
      - name: commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/e30PlayerStats.json
          git diff --staged --quiet || git commit -m "update e30PlayerStats.json"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}
