# kick 2026-06-20
name: 出走表データ自動更新

on:
  schedule:
    # 朝（JST 8:22 / 8:52 / 9:22）当日分の確定
    - cron: '22 23 * * *'
    - cron: '52 23 * * *'
    - cron: '22 0 * * *'
    # 夜（翌日分／ナイター場の公開が遅いので厚めに巡回）
    # GitHubのcronは遅延しやすいため複数本で確実に拾う
    - cron: '7 11 * * *'    # JST 20:07（ナイター20時台に当日+翌日をリフレッシュ）
    - cron: '7 13 * * *'    # JST 22:07
    - cron: '37 13 * * *'   # JST 22:37
    - cron: '7 14 * * *'    # JST 23:07
    - cron: '37 14 * * *'   # JST 23:37
    - cron: '7 15 * * *'    # JST 翌 0:07
    - cron: '37 15 * * *'   # JST 翌 0:37
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-racers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 pandas lxml
      - run: python scripts/scrape_racers.py
      # 節完結（venueMetaの日目=最終日）の場のモーター節成績を motorHistory.json に蓄積。
      # venueMeta.json は直前の scrape_racers で再生成済み、motors_all.csv はcheckout済みの既存を読む（読み取りのみ）。
      - run: python scripts/buildMotorHistory.py
      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git add docs/data/venueMeta.json  # 場メタ（節名・日目）をモーターページ用に確実にコミット対象へ
          git add docs/data/motorHistory.json  # モーター節成績の蓄積（前節1位機の元データ）
          git add docs/data/motorParts.json    # モーター整備履歴（部品交換）の蓄積
          git diff --staged --quiet && echo "no change" && exit 0
          git commit -m "出走表データ自動更新 $(date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push retry $i ..."
            sleep 5
          done
