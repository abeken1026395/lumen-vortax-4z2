name: 実況天候（直前気象）更新

on:
  schedule:
    # JST レース時間帯に高頻度取得。cronはUTC。JST=UTC+9。
    - cron: '*/20 23 * * *'    # JST 08:00-08:59（朝の第1R前後）
    - cron: '*/20 0-12 * * *'  # JST 09:00-21:59（デイ〜ナイター最終R）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-liveweather
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/scrapeLiveWeather.py   # 実況(予報でない)水面気象。boatrace.jp beforeinfo
      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/liveWeather.json docs/data/liveWeatherHistory.csv
          git diff --staged --quiet || git commit -m "update liveWeather.json (+history)"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
