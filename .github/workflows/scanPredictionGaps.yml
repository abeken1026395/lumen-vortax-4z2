name: predictions 欠番台帳スキャン（夜）

# 絶対防衛 4/4。全レース終了後の夜に直近N日のpredictions欠番を検知し、
# predictions_gaps.csv に台帳として記録する（検知・記録専用）。
# 生成・埋め戻しは一切しない（当日救済は点2 monitorPredictions と通常生成の役割）。

on:
  schedule:
    - cron: "50 14 * * *"   # JST 23:50（全場終了後）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-highlights   # 生成系と同一グループで同時実行を避ける
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 直近N日のpredictions欠番を検知・台帳記録（生成なし）
        run: python scripts/scanPredictionGaps.py

      - name: commit and push
        if: always()
        env:
          BR: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions_gaps.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"; exit 0
          fi
          git commit -m "scan: predictions 欠番台帳を更新（夜間・検知記録のみ）"
          for i in 1 2 3 4 5 6; do
            git fetch origin "$BR" || true
            if git rebase -X theirs "origin/$BR"; then
              if git push origin "HEAD:$BR"; then echo "pushed (try $i)"; exit 0; fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            sleep $(( (RANDOM % 6) + 3 ))
          done
          echo "push retries exhausted"; exit 1
