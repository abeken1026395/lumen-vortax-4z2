name: 見立て結果照合（夜）

on:
  schedule:
    # 第1層: 発火多重化（冪等・安全）。GitHubのschedule遅延/不発火に備え夜間〜早朝に4本。
    # results/verify_log/buildKansenkiSource はいずれも冪等（非null不変・重複追記排除）で、
    # commit手順は commit-first＋rebase なので多重発火でも壊れない。
    - cron: "37 14 * * *"   # JST 23:37（全場終了後・本命）
    - cron: "37 16 * * *"   # JST 01:37
    - cron: "37 18 * * *"   # JST 03:37
    - cron: "7 20 * * *"    # JST 05:07（当日朝リカバリの前段）
  workflow_dispatch:
    inputs:
      hd:
        description: "照合する日付(YYYYMMDD)。空欄なら当日(JST)。過去日を埋めるとき指定。"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: boatrace-results
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install lhafile beautifulsoup4 requests

      - name: build results (OpenAPI全場・決まり手/全式別払戻含む)
        run: python scripts/buildResults.py
        env:
          HD: ${{ github.event.inputs.hd }}

      - name: build results site data (docs/results/)
        run: python scripts/buildResultsSite.py

      - name: verify predictions
        run: python scripts/verifyPredictions.py
        env:
          HD: ${{ github.event.inputs.hd }}

      - name: build verify summary
        run: python scripts/build_verify_summary.py

      - name: build player monthly
        run: python scripts/buildPlayerMonthly.py

      # 観戦記素材JSON（翌朝執筆の唯一の入力）。buildResults の後段で前日結果を取り込む。
      # optional設計: pointrank失敗・素材欠でもジョブは落とさない（always + continue-on-error）。
      # scoreRank は自己検知確定まで shadow mode（BKS_SCORERANK_WRITE 未設定＝書き込み保留）。
      - name: build kansenki source
        if: always()
        continue-on-error: true
        run: python scripts/buildKansenkiSource.py

      - name: commit
        if: always()
        env:
          BR: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/ 2>/dev/null || true
          git add docs/results/data/ 2>/dev/null || true
          git add verify_log.csv 2>/dev/null || true
          git add docs/data/verify_summary.json 2>/dev/null || true
          git add docs/data/playerMonthly.json 2>/dev/null || true
          git add docs/data/kansenki/source/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"; exit 0
          fi
          # updateResultsLive方式に統一（PR #28系）: 先にコミット→rebase(-X theirs=自分の
          # 再生成データを優先)で衝突を機械解消→短いランダム待機でpushリトライ。
          # 他ワークフローの同時pushによる非fast-forward拒否（run#39の失敗）を根治する。
          git commit -m "auto: results + verify_log + summary"
          for i in 1 2 3 4 5 6; do
            git fetch origin "$BR" || true
            if git rebase -X theirs "origin/$BR"; then
              if git push origin "HEAD:$BR"; then
                echo "pushed (try $i)"; exit 0
              fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            sleep $(( (RANDOM % 6) + 3 ))
          done
          echo "push retries exhausted"; exit 1

      # 【対策B】網羅性チェック（通知＝ジョブ失敗）: 当日(JST)sourceの全場に観戦記があるか。
      # source は不完全CSV時点の暫定生成が後で完全CSVに差し替わり場が増えることがある
      # （07-11で丸亀/下関/若松が後から加わり、12場のまま書いた記事とカードが乖離した事象）。
      # 記事は人が書く自動追随しない生成物なので、この乖離を機械検知する。
      # 夜(23:37〜)は当日記事が揃っているべき時刻。欠場＝異常としてジョブを失敗させ通知する。
      # 当日記事0本の日はlint側でSKIP（非運用日）＝誤通知しない。commit/pushは前段で完了済み。
      - name: coverage check (kansenki articles) — 対策B 通知
        if: always()
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y%m%d)
          python scripts/lintKansenki.py --coverage "$TODAY"
