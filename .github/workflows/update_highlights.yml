name: 見どころJSON自動生成

on:
  workflow_run:
    workflows: ["出走表データ自動更新"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-highlights
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 見どころJSONを生成
        run: |
          python scripts/build_highlights.py \
            docs/racers/racers_today.csv \
            docs/motor/motors_all.csv \
            docs/highlights/highlights.json \
            docs/players/racerKimarite.csv \
            docs/data/weather.json

      - name: コミット＆プッシュ
        env:
          BR: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/highlights/
          git add predictions/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes（no-op）"; exit 0
          fi
          git commit -m "auto: update highlights.json + predictions"
          # commit-first＋rebase -X theirs（既存WFと同一作法）。並行push（update arare等）の
          # 非fast-forwardを6リトライで機械解消。素の git push は競合で即失敗するため統一。
          for i in 1 2 3 4 5 6; do
            git fetch origin "$BR" || true
            if git rebase -X theirs "origin/$BR"; then
              if git push origin "HEAD:$BR"; then echo "pushed (try $i)"; exit 0; fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            sleep $(( (RANDOM % 6) + 3 ))
          done
          echo "push retries exhausted"; exit 1
