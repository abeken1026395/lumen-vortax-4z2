name: 気象データ自動更新

on:
  schedule:
    - cron: '5 */3 * * *'   # 3時間ごと（UTC）。0,3,6...時の5分過ぎ
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-weather
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: fetch tide history（一時・潮汐実測の土台）
        run: python scripts/scrapeTideHistory.py
      - name: commit tideHistory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tideHistory/
          git diff --staged --quiet || git commit -m "add tideHistory (marine sea level/wave/swell 20250715-20260705)"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}
