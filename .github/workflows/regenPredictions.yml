name: regen predictions (parallel)

on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        range:
          - { s: "20250715", e: "20251015", id: "a" }
          - { s: "20251016", e: "20260115", id: "b" }
          - { s: "20260116", e: "20260415", id: "c" }
          - { s: "20260416", e: "20260705", id: "d" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: regenerate predictions
        env:
          SKIPW: "1"
        run: python scripts/regenPredictions.py "${{ matrix.range.s }}" "${{ matrix.range.e }}"

      - name: keep only this range
        run: |
          python - "${{ matrix.range.s }}" "${{ matrix.range.e }}" <<'PY'
          import os, sys, glob
          s, e = sys.argv[1], sys.argv[2]
          for f in glob.glob("predictions/*.json"):
              ymd = os.path.splitext(os.path.basename(f))[0]
              if not (s <= ymd <= e):
                  os.remove(f)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: preds-${{ matrix.range.id }}
          path: predictions/

  commit:
    needs: regen
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: clear old predictions
        run: rm -rf predictions && mkdir predictions

      - uses: actions/download-artifact@v4
        with:
          pattern: preds-*
          merge-multiple: true
          path: predictions/

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A predictions/
          git diff --cached --quiet || git commit -m "regen predictions 20250715-20260705 parallel"
          git pull --rebase origin main || true
          git push
