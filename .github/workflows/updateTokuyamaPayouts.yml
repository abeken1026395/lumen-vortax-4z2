name: update tokuyama payouts

on:
  schedule:
    - cron: '20 0 * * *'   # JST 9:20頃（前日のレース確定後）
    - cron: '20 1 * * *'   # 予備
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-payouts
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: scrape payouts
        run: python scripts/scrapeTokuyamaPayouts.py

      - name: build man rate json
        run: python scripts/buildTokuyamaManRate.py

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/payouts/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "update tokuyama payouts"
            git pull --rebase origin main
            git push
          fi
