name: update edogawa payouts

on:
  workflow_dispatch:
    inputs:
      START:
        description: '収集開始日 YYYYMMDD（空欄で既定 20250715）'
        required: false
        default: ''
      END:
        description: '収集終了日 YYYYMMDD（空欄で昨日=JST）'
        required: false
        default: ''
  schedule:
    - cron: '20 16 * * *'   # JST 翌1:20（結果確定後・他場と分離）

permissions:
  contents: write

concurrency:
  group: boatrace-edogawa-payouts
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo   # 日付境界をJSTに固定（昨日=完全確定日のみ収集）
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # mbraceはクラウドIP遮断のため使わない。到達可能な非公式ミラー(BoatraceOpenAPI)を参照。
      - name: scrape edogawa payouts (API source)
        continue-on-error: true
        env:
          START: ${{ github.event.inputs.START }}
          END: ${{ github.event.inputs.END }}
        run: python scripts/scrapeEdogawaPayoutsApi.py

      - name: build man rate json
        if: always()
        run: python scripts/buildEdogawaManRate.py

      - name: commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/payouts/edogawaPayouts.csv docs/payouts/edogawaManRate.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "update edogawa payouts"
          git pull --rebase origin main
          git push origin main
