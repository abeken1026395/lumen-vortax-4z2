<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の出走表 ｜ データ攻め</title>
<style>
:root{
  --bg:#0b1219; --panel:#111c26; --panel2:#0e1720;
  --line:#22303c; --txt:#e7eef5; --sub:#8ea3b5; --accent:#ffd166;
  --w1:#ffffff; --w2:#333333; --w3:#e5352b; --w4:#1e6fe0; --w5:#f2c200; --w6:#2ba24c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  -webkit-text-size-adjust:100%}
header{padding:16px 14px 10px;border-bottom:1px solid var(--line)}
h1{margin:0;font-size:18px;letter-spacing:.02em}
h1 span{color:var(--accent)}
.updated{color:var(--sub);font-size:11px;margin-top:4px}
.wrap{padding:12px 12px 40px;max-width:640px;margin:0 auto}

/* 場選択 */
.label{font-size:12px;color:var(--sub);margin:14px 2px 6px}
.venues{display:flex;flex-wrap:wrap;gap:6px}
.venue{background:var(--panel);border:1px solid var(--line);color:var(--txt);
  border-radius:8px;padding:7px 11px;font-size:13px;cursor:pointer;line-height:1}
.venue.on{background:var(--accent);color:#12202b;border-color:var(--accent);font-weight:700}

/* レースグリッド */
.races{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:2px}
.race{background:var(--panel);border:1px solid var(--line);color:var(--txt);
  border-radius:8px;padding:8px 0 6px;text-align:center;cursor:pointer}
.race .n{font-size:15px;font-weight:700}
.race .dl{font-size:10px;color:var(--sub);margin-top:2px}
.race.on{background:var(--accent);border-color:var(--accent)}
.race.on .n,.race.on .dl{color:#12202b}

/* 見出し行 */
.rhead{display:flex;justify-content:space-between;align-items:baseline;
  margin:16px 2px 8px}
.rhead .title{font-size:16px;font-weight:700}
.rhead .dl{font-size:12px;color:var(--accent)}

/* 6艇カード */
.boat{display:flex;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;margin-bottom:7px;overflow:hidden}
.wk{width:34px;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800}
.wk1{background:var(--w1);color:#111} .wk2{background:var(--w2);color:#fff}
.wk3{background:var(--w3);color:#fff} .wk4{background:var(--w4);color:#fff}
.wk5{background:var(--w5);color:#111} .wk6{background:var(--w6);color:#fff}
.info{flex:1;min-width:0;padding:7px 10px}
.line1{display:flex;align-items:center;gap:7px}
.rank{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;
  background:#2a3947;color:var(--txt);flex:none}
.rank.A1{background:#c0392b;color:#fff} .rank.A2{background:#9b4020;color:#fff}
.rank.B1{background:#2a3947} .rank.B2{background:#1f2a34;color:var(--sub)}
.nm{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{font-size:11px;color:var(--sub);flex:none}
.line2{display:flex;gap:14px;margin-top:5px;flex-wrap:wrap}
.stat{font-size:11px;color:var(--sub)}
.stat b{color:var(--txt);font-size:13px;font-weight:700;margin-left:3px}
.stat.hi b{color:var(--accent)}
.st{margin-left:auto}

/* 荒れ指数 */
.race .ar{width:7px;height:7px;border-radius:50%;margin:3px auto 0}
.ar-h{background:#e5352b} .ar-m{background:var(--accent)} .ar-l{background:transparent}
.arare{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;margin:0 0 12px}
.arare .top{display:flex;align-items:center;gap:8px}
.arare .badge{font-size:12px;font-weight:700;padding:2px 9px;border-radius:6px}
.badge-h{background:#e5352b;color:#fff} .badge-m{background:var(--accent);color:#12202b}
.badge-l{background:#2a3947;color:var(--sub)}
.arare .sc{font-size:12px;color:var(--sub)}
.arare ul{margin:8px 0 0;padding-left:18px}
.arare li{font-size:12px;color:var(--txt);margin:2px 0;line-height:1.5}
.arare .none{font-size:12px;color:var(--sub);margin-top:6px}
.empty{color:var(--sub);text-align:center;padding:40px 0;font-size:13px}
.note{color:var(--sub);font-size:11px;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<header>
  <h1><span>▍</span>今日の出走表</h1>

const COLS = RAW.columns, DATA = RAW.data, VENUES = RAW.venues;
document.getElementById("updated").textContent = "更新 " + (RAW.updated||"");

const idx = {};
COLS.forEach((c,i)=>idx[c]=i);
const G = (row,name)=> (idx[name]!=null ? row[idx[name]] : "");

// 場コード -> レース -> 枠順の艇配列
const byVenue = {};
DATA.forEach(row=>{
  const jcd = G(row,"場コード");
  const rno = parseInt(String(G(row,"レース")).replace(/\D/g,""))||0;
  if(!byVenue[jcd]) byVenue[jcd]={name:G(row,"場名"),races:{}};
  if(!byVenue[jcd].races[rno]) byVenue[jcd].races[rno]=[];
  byVenue[jcd].races[rno].push(row);
});
const openJcd = Object.keys(byVenue).sort();

let curJcd = openJcd[0]||null, curRno = 1;
let ARARE = {};
fetch("../data/arare.json").then(r=>r.json()).then(d=>{
  ARARE = d.races||{}; renderRaces(); renderDetail();
}).catch(()=>{});

function trim(s){ return String(s||"").replace(/\s+/g,""); }
function num(s){ const v=parseFloat(s); return isNaN(v)?null:v; }

function renderVenues(){
  const el=document.getElementById("venues"); el.innerHTML="";
  if(openJcd.length===0){ el.innerHTML='<div class="empty">本日の出走表はまだありません。</div>'; return; }
  openJcd.forEach(jcd=>{
    const b=document.createElement("button");
    b.className="venue"+(jcd===curJcd?" on":"");
    b.textContent=byVenue[jcd].name;
    b.onclick=()=>{curJcd=jcd;curRno=1;renderVenues();renderRaces();renderDetail();};
    el.appendChild(b);
  });
}

function renderRaces(){
  const el=document.getElementById("races"); el.innerHTML="";
  if(!curJcd) return;
  const races=byVenue[curJcd].races;
  for(let r=1;r<=12;r++){
    const boats=races[r];
    const b=document.createElement("button");
    b.className="race"+(r===curRno?" on":"");
    if(!boats){ b.style.opacity=.35; b.disabled=true; }
    const dl = boats? trim(G(boats[0],"締切時刻")) : "";
    const a = boats? ARARE[curJcd+"_"+r] : null;
    const dot = a? '<div class="ar ar-'+({高:"h",中:"m",低:"l"}[a.level]||"l")+'"></div>' : '';
    b.innerHTML='<div class="n">'+r+'R</div><div class="dl">'+(dl||"&nbsp;")+'</div>'+dot;
    if(boats) b.onclick=()=>{curRno=r;renderRaces();renderDetail();};
    el.appendChild(b);
  }
}

function renderDetail(){
  const el=document.getElementById("detail"); el.innerHTML="";
  if(!curJcd) return;
  const boats=(byVenue[curJcd].races[curRno]||[]).slice()
    .sort((a,b)=>(num(G(a,"枠"))||0)-(num(G(b,"枠"))||0));
  if(boats.length===0){ el.innerHTML='<div class="empty">このレースのデータがありません。</div>'; return; }

  const dl=trim(G(boats[0],"締切時刻"));
  const head=document.createElement("div");
  head.className="rhead";
  head.innerHTML='<div class="title">'+byVenue[curJcd].name+' '+curRno+'R</div>'
    +(dl?'<div class="dl">締切 '+dl+'</div>':'');
  el.appendChild(head);

  const a = ARARE[curJcd+"_"+curRno];
  if(a){
    const lv={高:"h",中:"m",低:"l"}[a.level]||"l";
    const box=document.createElement("div");
    box.className="arare";
    let inner='<div class="top">'
      +'<span class="badge badge-'+lv+'">荒れ指数 '+a.level+'</span>'
      +'<span class="sc">条件 '+a.score+' / '+8+''
      +(a.wind!=null?'　風'+a.wind+'m':'')+'</span></div>';
    if(a.factors&&a.factors.length){
      inner+='<ul>'+a.factors.map(f=>'<li>'+f+'</li>').join('')+'</ul>';
    }else{
      inner+='<div class="none">目立った荒れ条件なし（堅めの目安）。</div>';
    }
    box.innerHTML=inner;
    el.appendChild(box);
  }

  boats.forEach(row=>{
    const wk=trim(G(row,"枠"))||"?";
    const rank=trim(G(row,"級別"));
    const zenP=G(row,"全国勝率"), zen2=G(row,"全国2連率");
    const totP=G(row,"当地勝率"), tot2=G(row,"当地2連率");
    const hiP = (num(totP)!=null && num(zenP)!=null && num(totP)>num(zenP));
    const hi2 = (num(tot2)!=null && num(zen2)!=null && num(tot2)>num(zen2));
    const st=trim(G(row,"平均ST"));
    const div=document.createElement("div");
    div.className="boat";
    div.innerHTML=
      '<div class="wk wk'+wk+'">'+wk+'</div>'
      +'<div class="info">'
      +'<div class="line1">'
        +'<span class="rank '+rank+'">'+rank+'</span>'
        +'<span class="nm">'+trim(G(row,"氏名"))+'</span>'
        +'<span class="meta">'+trim(G(row,"支部"))+' '+trim(G(row,"年齢"))+'</span>'
      +'</div>'
      +'<div class="line2">'
        +'<span class="stat">全国<b>'+(zenP||"-")+'</b></span>'
        +'<span class="stat'+(hiP?' hi':'')+'">当地<b>'+(totP||"-")+'</b></span>'
        +'<span class="stat">全2<b>'+(zen2||"-")+'</b></span>'
        +'<span class="stat'+(hi2?' hi':'')+'">当2<b>'+(tot2||"-")+'</b></span>'
        +'<span class="stat st">ST<b>'+(st||"-")+'</b></span>'
      +'</div>'
      +'</div>';
    el.appendChild(div);
  });
}

renderVenues(); renderRaces(); renderDetail();
</script>
