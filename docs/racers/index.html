<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の出走表｜データ攻め</title>
<style>
  :root{
    --bg:#0b1219; --panel:#111d28; --panel2:#16242f; --line:#243441;
    --ink:#e8eef3; --muted:#8aa0b0; --accent:#ffd166; --accent-dim:#caa23f;
    --good:#28d07a; --warn:#ff7a59;
    --w1:#ffffff; --w2:#2b2b2b; --w3:#e23b4e; --w4:#2f7fe0; --w5:#f5c200; --w6:#1fae5a;
    --g-a1:#e8506e; --g-a2:#f0883e; --g-b1:#8cc152; --g-b2:#4a90d9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:560px;margin:0 auto;padding:0 12px 48px}
  header.bar{position:sticky;top:0;z-index:20;background:rgba(11,18,25,.92);
    backdrop-filter:blur(6px);border-bottom:1px solid var(--line);}
  .bar-in{max-width:560px;margin:0 auto;padding:10px 12px;display:flex;align-items:baseline;gap:8px}
  .bar .logo{font-weight:800;letter-spacing:.04em;color:var(--accent);font-size:15px}
  .bar .sub{font-size:12px;color:var(--muted)}
  .hl-link{margin-left:auto;font-size:12px;font-weight:700;color:var(--accent);background:rgba(255,209,102,.12);border:1px solid var(--accent-dim);border-radius:999px;padding:4px 10px;text-decoration:none;white-space:nowrap}
  .updated{font-size:11px;color:var(--muted);margin:10px 2px 0}
  h2.step{font-size:13px;color:var(--muted);margin:18px 2px 8px;font-weight:600;letter-spacing:.02em}
  .venues{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .venue{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 8px;text-align:center;cursor:pointer;color:var(--ink);}
  .venue:hover{border-color:var(--accent-dim)}
  .venue .no{font-size:11px;color:var(--muted)}
  .venue .nm{font-size:17px;font-weight:700;margin-top:2px}
  .venue{position:relative}
  .venue .vsub{font-size:11px;color:var(--muted);margin-top:3px}
  .venue .vare{position:absolute;top:6px;right:6px;font-size:10px;font-weight:800;
    color:#0b1219;background:var(--warn);border-radius:999px;padding:1px 6px}
  .todayinfo{font-size:13px;color:var(--ink);font-weight:600;margin:6px 2px 0}
  .chiku{grid-column:1/-1;font-size:12px;color:var(--accent);font-weight:700;
    margin:12px 2px 2px;letter-spacing:.04em}
  .toprow{display:flex;align-items:center;gap:10px;margin:14px 0 4px}
  .back{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
  .venue-title{font-size:20px;font-weight:800}
  .venue-title .vno{font-size:12px;color:var(--muted);font-weight:600;margin-right:6px}
  .rgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:10px 0}
  .rbtn{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 0;text-align:center;font-weight:700;font-size:15px;color:var(--ink);cursor:pointer;}
  .rbtn.on{background:var(--accent);color:#0b1219;border-color:var(--accent)}
  .rbtn .cnt{position:absolute;top:-6px;right:-6px;min-width:17px;height:17px;line-height:17px;
    font-size:10px;font-weight:800;border-radius:999px;background:var(--warn);color:#0b1219;padding:0 4px;}
  .rbtn.on .cnt{background:#0b1219;color:var(--accent)}
  .deadline{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin:6px 2px 2px;}
  .deadline .lab{font-size:12px;color:var(--bg);background:var(--muted);padding:4px 10px;border-radius:999px;font-weight:700}
  .deadline .t{font-size:30px;font-weight:800;letter-spacing:.02em}
  .rtitle{font-size:16px;font-weight:700;margin:2px 2px 12px;color:var(--ink)}
  .are{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin:2px 0 12px}
  .are-head{display:flex;align-items:baseline;justify-content:space-between}
  .are-title{font-size:13px;font-weight:800;letter-spacing:.02em}
  .are-count{font-size:14px;color:var(--muted);font-weight:700}
  .are-count .n{font-size:26px;color:var(--warn);font-weight:800;margin-right:1px}
  .are-list{list-style:none;margin:9px 0 0;padding:0;display:grid;gap:5px}
  .are-list li{font-size:13px;display:flex;align-items:center;gap:7px}
  .are-list li .mk{width:16px;text-align:center;font-weight:800}
  .are-list li.on{color:var(--ink)} .are-list li.on .mk{color:var(--warn)}
  .are-list li.off{color:var(--muted)} .are-list li.off .mk{color:var(--line)}
  .are-list li.pending{color:var(--muted);font-style:italic}
  .are-list li.pending .mk{color:var(--muted);font-style:normal}
  .are-note{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.55}
  .psy{margin-top:9px;border-top:1px solid var(--line);padding-top:8px}
  .psy summary{font-size:12px;color:var(--accent-dim);cursor:pointer;font-weight:700;list-style:none}
  .psy summary::-webkit-details-marker{display:none}
  .psy summary::before{content:"▸ ";color:var(--accent-dim)}
  .psy[open] summary::before{content:"▾ "}
  .psy-list{list-style:none;margin:8px 0 0;padding:0;display:grid;gap:6px}
  .psy-list li{font-size:12px;color:var(--muted);line-height:1.55}
  .psy-list li b{color:var(--ink)}
  .psy-src{font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.5;font-style:italic}
  .boat{display:grid;grid-template-columns:44px 1fr;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:9px;}
  .band{display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800}
  .band[data-w="1"]{background:var(--w1);color:#111}
  .band[data-w="2"]{background:var(--w2);color:#fff}
  .band[data-w="3"]{background:var(--w3);color:#fff}
  .band[data-w="4"]{background:var(--w4);color:#fff}
  .band[data-w="5"]{background:var(--w5);color:#111}
  .band[data-w="6"]{background:var(--w6);color:#fff}
  .body{padding:9px 11px}
  .line1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:800;color:#fff;border-radius:5px;padding:2px 7px}
  .badge.A1{background:var(--g-a1)} .badge.A2{background:var(--g-a2)}
  .badge.B1{background:var(--g-b1)} .badge.B2{background:var(--g-b2)}
  .toban{font-size:12px;color:var(--muted)}
  .name{font-size:18px;font-weight:800;margin:1px 0 0}
  .heart{color:#ff5fa2;font-size:15px;margin-left:5px;vertical-align:1px}
  .meta{font-size:12px;color:var(--muted);margin-top:1px}
  .warnchip{font-size:11px;font-weight:700;color:var(--warn);border:1px solid var(--warn);
    border-radius:999px;padding:2px 8px;margin-left:auto}
  .stats{display:grid;grid-template-columns:42px 1fr 1fr;gap:6px 8px;margin-top:8px;
    padding-top:8px;border-top:1px solid var(--line);align-items:center}
  .stats .h{font-size:10px;color:var(--muted);text-align:center}
  .scell{font-size:14px;text-align:center}
  .scell .v{font-weight:700}
  .rowlab{font-size:11px;color:var(--muted);font-weight:700}
  .local.up .v{color:var(--good)}
  .local.up .arrow{color:var(--good);font-weight:800}
  .legend{font-size:11px;color:var(--muted);margin:14px 2px 0;line-height:1.7}
  .legend b{color:var(--ink)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle;margin-right:3px}
  .empty{color:var(--muted);font-size:13px;padding:20px 4px}
  .hidden{display:none}
</style>
</head>
<body>
<header class="bar">
  <div class="bar-in"><span class="logo">BOATRACE 出走表</span><span class="sub">荒れ条件つき・毎日更新</span><a class="hl-link" href="../highlights/">⚡見どころ</a></div>
</header>

<div class="wrap">
  <div class="updated" id="updated"></div>

  <section id="viewVenues">

  <section id="viewRace" class="hidden">
    <div class="toprow">
      <button class="back" id="backBtn">← 場一覧</button>
      <div class="venue-title"><span class="vno" id="vNo"></span><span id="vName"></span></div>
    </div>
    <h2 class="step">レースを選ぶ</h2>

    <div class="deadline"><span class="lab">締切時刻</span><span class="t" id="deadline">--:--</span></div>
    <div class="rtitle" id="rTitle"></div>
    <div class="are" id="arePanel"></div>
    <div id="boats"></div>
    <div class="legend">
      <span class="dot" style="background:var(--good)"></span><b>当地↑</b>＝当地勝率が全国勝率より高い（その場で上げてくる目安）<br>

    </div>
  </section>
</div>

  const FEMALE=new Set(["3175", "3207", "3232", "3289", "3302", "3334", "3355", "3357", "3435", "3470", "3474", "3509", "3518", "3528", "3551", "3579", "3580", "3604", "3611", "3618", "3645", "3704", "3778", "3801", "3845", "3871", "3900", "3932", "3943", "3993", "3994", "3999", "4011", "4014", "4017", "4045", "4050", "4065", "4071", "4098", "4117", "4123", "4183", "4190", "4208", "4224", "4225", "4240", "4243", "4244", "4246", "4275", "4283", "4286", "4289", "4300", "4304", "4313", "4317", "4347", "4349", "4372", "4373", "4385", "4387", "4399", "4400", "4408", "4414", "4419", "4433", "4443", "4447", "4450", "4456", "4464", "4473", "4478", "4479", "4482", "4484", "4499", "4501", "4502", "4510", "4519", "4525", "4530", "4534", "4536", "4546", "4548", "4556", "4569", "4589", "4590", "4611", "4627", "4642", "4678", "4680", "4689", "4690", "4694", "4714", "4720", "4726", "4730", "4733", "4738", "4744", "4746", "4758", "4764", "4765", "4773", "4775", "4781", "4784", "4791", "4804", "4819", "4823", "4825", "4843", "4844", "4845", "4853", "4854", "4874", "4878", "4882", "4884", "4885", "4891", "4893", "4897", "4900", "4901", "4909", "4924", "4927", "4936", "4938", "4940", "4941", "4947", "4961", "4963", "4964", "4965", "4974", "4984", "4987", "4990", "4994", "4997", "4998", "5003", "5013", "5019", "5030", "5045", "5052", "5056", "5057", "5069", "5072", "5078", "5079", "5088", "5108", "5113", "5117", "5118", "5123", "5129", "5140", "5144", "5146", "5148", "5151", "5153", "5155", "5156", "5162", "5163", "5164", "5165", "5171", "5173", "5174", "5180", "5182", "5184", "5188", "5189", "5192", "5193", "5194", "5195", "5198", "5200", "5203", "5204", "5205", "5213", "5215", "5218", "5227", "5230", "5231", "5241", "5248", "5250", "5251", "5254", "5264", "5265", "5272", "5277", "5281", "5283", "5287", "5291", "5295", "5296", "5297", "5305", "5306", "5310", "5314", "5317", "5320", "5322", "5324", "5326", "5327", "5334", "5335", "5340", "5342", "5346", "5347", "5357", "5358", "5360", "5361", "5362", "5365", "5367", "5370", "5373", "5380", "5387", "5389", "5390", "5391", "5397", "5399", "5406", "5410", "5412", "5413", "5414", "5415", "5416", "5418", "5428", "5435", "5436", "5437", "5438", "5439", "5440", "5442", "5444", "5446", "5447", "5451", "5454", "5459", "5461", "5462", "5464", "5471", "5472"]);
  const R = window.__D || {columns:[],data:[],venues:{},updated:""};
  const cols = R.columns || [];
  const idx = {}; cols.forEach((c,i)=>{ idx[c]=i; });
  const V = (row,name)=>{ const i=idx[name]; return (i==null||row[i]==null)?"":row[i]; };
  const num = s=>{ const n=parseFloat(s); return isNaN(n)?null:n; };

  // 場コード -> {name, races:{ "1R":[boat...] }, deadline:{ "1R":"HH:MM"} }
  const byVenue = {};
  (R.data||[]).forEach(row=>{
    const jcd = V(row,"場コード"); const venue = V(row,"場名"); const race = V(row,"レース");
    if(!jcd || !race) return;
    if(!byVenue[jcd]) byVenue[jcd] = { name:venue, races:{}, deadline:{} };
    if(!byVenue[jcd].races[race]) byVenue[jcd].races[race] = [];
    byVenue[jcd].races[race].push({
      waku: parseInt(V(row,"枠"),10) || (byVenue[jcd].races[race].length+1),
      grade: V(row,"級別"), name: V(row,"氏名"),
      shibu: V(row,"支部"), home: V(row,"出身"), age: V(row,"年齢"),
      toban: V(row,"登録番号"), st: V(row,"平均ST"), f: parseInt(V(row,"F数"),10)||0,
      zr: num(V(row,"全国勝率")), z2: num(V(row,"全国2連率")),
      lr: num(V(row,"当地勝率")), l2: num(V(row,"当地2連率")),
    });
    const dl = V(row,"締切時刻");
    if(dl) byVenue[jcd].deadline[race] = dl;
  });
  // 各レース内を枠順ソート
  Object.values(byVenue).forEach(v=>{
    Object.keys(v.races).forEach(r=>{ v.races[r].sort((a,b)=>a.waku-b.waku); });
  });

  const venueKeys = Object.keys(byVenue).sort();

  // ---- 荒れ条件（レース内のみ） ----
  function stNum(s){ const n=parseFloat(s); return (n>0)?n:null; }
  function areSignals(boats){
    const l1=boats[0]||{};
    const outer=boats.slice(3), out56=boats.slice(4);
    const l1st=stNum(l1.st);
    const outerMax=outer.length?Math.max.apply(null,outer.map(x=>x.zr||0)):0;
    const conds=[
      {key:"①",label:"1号艇がB級",on:(l1.grade||"")[0]==="B"},
      {key:"②",label:"格上が外にいる（4〜6号艇）",on:(l1.zr!=null)&&outerMax>l1.zr},
      {key:"③",label:"1号艇が当地で落とす",on:(l1.lr!=null&&l1.lr>0&&l1.zr!=null&&l1.lr<l1.zr)},
      {key:"④",label:"アウトにST巧者（5・6号艇）",on:(l1st!=null)&&out56.some(x=>{const s=stNum(x.st);return s!=null&&s<l1st;})},
      {key:"⑤",label:"1号艇がF持ち",on:(l1.f||0)>0},
    ];
    return {conds,count:conds.filter(c=>c.on).length,total:conds.length};
  }

  // ---- 画面制御 ----
  const elV=document.getElementById("venueGrid");
  const viewV=document.getElementById("viewVenues"), viewR=document.getElementById("viewRace");
  document.getElementById("updated").textContent = "最終更新: " + (R.updated||"-");
  let cur={jcd:null};

  const CHIKU={ "01":"関東","02":"関東","03":"関東","04":"関東","05":"関東",
    "06":"東海","07":"東海","08":"東海","09":"東海",
    "10":"近畿","11":"近畿","12":"近畿","13":"近畿","14":"四国","15":"四国",
    "16":"中国","17":"中国","18":"中国","19":"中国",
    "20":"九州","21":"九州","22":"九州","23":"九州","24":"九州" };
  const CHIKU_ORDER=["関東","東海","近畿","四国","中国","九州"];

  function venueKind(v){
    const hs=Object.values(v.deadline).map(t=>parseInt((t||"").split(":")[0],10)).filter(h=>!isNaN(h));
    if(!hs.length) return "";
    const mn=Math.min.apply(null,hs), mx=Math.max.apply(null,hs);
    if(mx>=19) return "ナイター"; if(mn<10) return "モーニング"; return "デイ";
  }
  function venueAreMax(v){ let m=0; Object.values(v.races).forEach(b=>{const c=areSignals(b).count; if(c>m)m=c;}); return m; }
  function fmtDate(s){ if(!/^\d{8}$/.test(s)) return s;
    const y=+s.slice(0,4),m=+s.slice(4,6),d=+s.slice(6,8);
    const wd=["日","月","火","水","木","金","土"][new Date(y,m-1,d).getDay()];
    return m+"/"+d+"（"+wd+"）"; }

  // 今日情報（最頻の開催日＋開催場数）
  const dc={}; (R.data||[]).forEach(r=>{const d=V(r,"開催日"); if(d) dc[d]=(dc[d]||0)+1;});
  const today=Object.keys(dc).sort((a,b)=>dc[b]-dc[a])[0]||"";
  document.getElementById("todayInfo").textContent=
    (today?fmtDate(today)+"・":"")+venueKeys.length+"場開催";

  if(venueKeys.length===0){ document.getElementById("noData").classList.remove("hidden"); }
  // 地区ごとにグループ化して描画
  const groups={}; venueKeys.forEach(jcd=>{ const ch=CHIKU[jcd]||"その他"; (groups[ch]=groups[ch]||[]).push(jcd); });
  CHIKU_ORDER.concat(["その他"]).forEach(ch=>{
    if(!groups[ch]) return;
    const h=document.createElement("div"); h.className="chiku"; h.textContent=ch; elV.appendChild(h);
    groups[ch].forEach(jcd=>{
      const v=byVenue[jcd];
      const kind=venueKind(v), rc=Object.keys(v.races).length, am=venueAreMax(v);
      const b=document.createElement("button"); b.className="venue";
      b.innerHTML='<div class="no">'+jcd+'</div><div class="nm">'+v.name+'</div>'+
        '<div class="vsub">'+rc+'R'+(kind?' · '+kind:'')+'</div>'+
        (am>0?'<span class="vare">荒れ'+am+'</span>':'');
      b.onclick=()=>openVenue(jcd); elV.appendChild(b);
    });
  });
  document.getElementById("backBtn").onclick=()=>{viewR.classList.add("hidden");viewV.classList.remove("hidden");window.scrollTo(0,0);};

  function raceKeys(jcd){
    return Object.keys(byVenue[jcd].races).sort((a,b)=>parseInt(a)-parseInt(b));
  }
  function openVenue(jcd){
    cur.jcd=jcd;
    document.getElementById("vNo").textContent=jcd;
    document.getElementById("vName").textContent=byVenue[jcd].name;
    const g=document.getElementById("raceGrid"); g.innerHTML="";
    const rks=raceKeys(jcd);
    rks.forEach((rk,i)=>{
      const b=document.createElement("button"); b.className="rbtn"+(i===0?" on":"");
      const cnt=areSignals(byVenue[jcd].races[rk]).count;
      b.innerHTML=rk+(cnt>0?'<span class="cnt">'+cnt+'</span>':"");
      b.onclick=()=>selectRace(rk,b); g.appendChild(b);
    });
    viewV.classList.add("hidden"); viewR.classList.remove("hidden");
    if(rks.length) selectRace(rks[0], g.firstChild);
    window.scrollTo(0,0);
  }
  function selectRace(rk,btn){
    document.querySelectorAll(".rbtn").forEach(x=>x.classList.remove("on"));
    if(btn) btn.classList.add("on");
    const boats=byVenue[cur.jcd].races[rk];
    document.getElementById("deadline").textContent=byVenue[cur.jcd].deadline[rk]||"--:--";
    document.getElementById("rTitle").textContent=rk;
    const sig=areSignals(boats);
    renderArePanel(sig);
    renderBoats(boats,sig);
  }
  function renderArePanel(sig){
    const items=sig.conds.map(c=>'<li class="'+(c.on?'on':'off')+'"><span class="mk">'+(c.on?'✓':'・')+'</span>'+c.key+' '+c.label+'</li>').join("");
    document.getElementById("arePanel").innerHTML=
      '<div class="are-head"><span class="are-title">荒れ条件</span>'+
      '<span class="are-count"><span class="n">'+sig.count+'</span>/'+sig.total+'</span></div>'+
      '<ul class="are-list">'+items+
      '<li class="pending"><span class="mk">—</span>天候（向かい風／強風／追い風）— 締切時刻＋風予報の連携後に点灯</li></ul>'+
      '<div class="are-note">万舟が出やすい状況がいくつ揃ったかの目安です。点数・確率・買い目は出しません。判断はご自身で。</div>'+
      '<details class="psy"><summary>賭ける前に（自分の心理）</summary>'+
        '<ul class="psy-list">'+
          '<li><b>損失回避</b>：負けたあとほど、取り返そうとして大きく賭けがち。</li>'+
          '<li><b>追い上げ</b>：負けが続くと賭け金を上げてしまう。各レースは独立で、前の負けはここでは取り返せない。</li>'+
          '<li><b>サンクコスト</b>：「ここまで使ったから」は判断を歪める。今のレースだけで考える。</li>'+
        '</ul>'+
        '<div class="psy-src">出所：プロスペクト理論（Kahneman &amp; Tversky）。点数を絞る・決めた額を超えない、が長く付き合うコツ。</div>'+
      '</details>';
  }
  function fmt(n,d){ return (n==null)?"–":n.toFixed(d); }
  function renderBoats(boats,sig){
    const l1map={"①":"B級","②":"格上が外","③":"当地で落とす","⑤":"F持ち"};
    const reasons=sig.conds.filter(c=>c.on&&l1map[c.key]).map(c=>l1map[c.key]);
    const wrap=document.getElementById("boats"); wrap.innerHTML="";
    boats.forEach((p,i)=>{
      const w=p.waku||(i+1);
      const localUp=(p.lr!=null&&p.lr>0&&p.zr!=null&&p.lr>p.zr);
      const warn=(w===1&&reasons.length>0)?'<span class="warnchip">⚠ '+reasons.slice(0,2).join("/")+'</span>':"";
      const grade=(p.grade||"").replace(/[^A-B0-9]/g,"");
      const metaParts=[p.shibu,p.home,(p.age?p.age+"歳":"")].filter(Boolean).join("／");
      const el=document.createElement("div"); el.className="boat";
      el.innerHTML=
        '<div class="band" data-w="'+w+'">'+w+'</div>'+
        '<div class="body">'+
          '<div class="line1"><span class="badge '+grade+'">'+(p.grade||"")+'</span>'+
            '<span class="toban">'+(p.toban||"")+'</span>'+warn+'</div>'+
          '<div class="name">'+(p.name||"")+(FEMALE.has(String(p.toban))?' <span class="heart">\u2665</span>':"")+'</div>'+
          '<div class="meta">'+metaParts+(p.st?'　平均ST '+p.st:"")+'</div>'+
          '<div class="stats">'+
            '<div class="rowlab"></div><div class="h">勝率</div><div class="h">2連率</div>'+
            '<div class="rowlab">全国</div>'+
              '<div class="scell"><span class="v">'+fmt(p.zr,2)+'</span></div>'+
              '<div class="scell"><span class="v">'+fmt(p.z2,1)+'</span></div>'+
            '<div class="rowlab">当地</div>'+
              '<div class="scell local '+(localUp?'up':'')+'"><span class="v">'+fmt(p.lr,2)+'</span>'+(localUp?'<span class="arrow"> ↑</span>':'')+'</div>'+
              '<div class="scell local '+(localUp?'up':'')+'"><span class="v">'+fmt(p.l2,1)+'</span></div>'+
          '</div>'+
        '</div>';
      wrap.appendChild(el);
    });
  }
})();
</script>
</body>
</html>
