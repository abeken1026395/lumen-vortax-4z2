<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日の出走表 | データ攻め</title>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0b1219">
<link rel="apple-touch-icon" href="../icon180.png">
<link rel="icon" href="../icon192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="データ攻め">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b1219; color:#e0e6ed; font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif; padding-bottom:60px; -webkit-text-size-adjust:100%; }
.wrap { max-width:660px; margin:0 auto; padding:14px 12px; }
header h1 { font-size:20px; color:#ffd166; letter-spacing:1px; }
header .sub { font-size:11px; color:#8a94a3; margin-top:4px; }
.crumb { font-size:12px; color:#8a94a3; margin:10px 0 6px; }
.crumb a { color:#ffd166; text-decoration:none; }

/* 場カード */
.venue-card { background:#121c28; border:1px solid #1f2b3a; border-radius:10px; padding:12px 14px; margin-top:10px; cursor:pointer; display:flex; align-items:center; gap:12px; }
.venue-card:active { background:#182535; }
.venue-name { font-size:17px; font-weight:bold; color:#fff; min-width:64px; }
.venue-meta { flex:1; font-size:11px; color:#9fb0c3; line-height:1.6; }
.venue-day { font-size:11px; color:#ffd166; border:1px solid #ffd16655; border-radius:4px; padding:1px 6px; white-space:nowrap; }
.date-head { font-size:13px; font-weight:bold; color:#ffd166; margin:16px 2px 4px; padding-bottom:4px; border-bottom:1px solid #2a3548; }
.date-head:first-child { margin-top:6px; }

/* Rグリッド */
.rgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
.rbtn { background:#121c28; border:1px solid #1f2b3a; border-radius:8px; padding:8px 4px; text-align:center; cursor:pointer; position:relative; }
.rbtn:active { background:#182535; }
.rbtn .rno { font-size:16px; font-weight:bold; color:#fff; }
.rbtn .dl { font-size:10px; color:#8a94a3; margin-top:2px; }
.rbtn.closed { opacity:.4; }
.rbtn.closed .rno { color:#8a94a3; }
.rbtn .dot { position:absolute; top:6px; right:6px; width:7px; height:7px; border-radius:50%; }
.dot-高 { background:#e66767; } .dot-中 { background:#ffd166; } .dot-低 { background:#199e70; }

/* レースヘッダ */
.race-head { background:#121c28; border:1px solid #1f2b3a; border-radius:10px; padding:12px 14px; margin-top:10px; }
.race-head .line1 { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.race-head .rt { font-size:18px; font-weight:bold; color:#ffd166; }
.race-head .kikaku { font-size:13px; color:#e0e6ed; }
.race-head .dl { font-size:12px; color:#9fb0c3; margin-top:4px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.race-links { margin-top:9px; display:flex; gap:8px; flex-wrap:wrap; }
.offlink { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:bold; text-decoration:none; border-radius:6px; padding:5px 12px; }
.offlink-result { color:#0b1219; background:#ffd166; }
.offlink-result:active { background:#e8bd50; }
.offlink-pend { color:#8a94a3; background:#0f1a26; border:1px solid #2a3a4d; }
.offlink-card { color:#a9c6dd; background:#0f1a26; border:1px solid #24344a; }
.cd { font-size:12px; font-weight:bold; border-radius:5px; padding:2px 8px; }
.cd-open { background:#12301f; color:#69db7c; border:1px solid #1e5c38; }
.cd-soon { background:#3a2a12; color:#ffd166; border:1px solid #6a4d18; }
.cd-closed { background:#241820; color:#b98; border:1px solid #4a2f3a; }

/* サマリーチップ */
.chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.chip { font-size:11px; border-radius:14px; padding:3px 10px; border:1px solid #24344a; background:#0f1a26; color:#a9c6dd; display:flex; align-items:center; gap:5px; }
.chip b { font-weight:bold; }
.chip-arare-高 { border-color:#5a2b2b; color:#ff9c9c; }
.chip-arare-中 { border-color:#5a4a1a; color:#ffd166; }
.chip-arare-低 { border-color:#1e5c38; color:#7fe0a0; }
.chip-fix { border-color:#3a4d63; color:#cdd6e0; }
/* ファン化：見どころへの導線チップ */
.chip-link { border-color:#4a370f; color:#ffd166; text-decoration:none; background:rgba(255,209,102,.06); }
/* ファン化：読む派の一言 */
.reader-line { font-size:11px; color:#8a94a3; margin-top:2px; }
.reader-line b { color:#cdd6e0; font-weight:600; }
/* 企画レース（進入固定/A級系/選抜）＝teal。事実の当日判定・生名称由来 */
.chip-plan { border-color:#2f5d55; color:#7fe0c8; background:rgba(127,224,200,.06); }
/* 節ステージ（準優勝戦/優勝戦）＝gold。企画系と区分を分け「企画」と誤読させない */
.chip-stage { border-color:#6a5320; color:#ffd166; background:rgba(255,209,102,.06); }

/* パネル */
.panel { border-radius:10px; padding:10px 12px; margin-top:8px; font-size:12px; line-height:1.7; }
.panel .ttl { font-size:12px; font-weight:bold; margin-bottom:3px; }
.panel-arare { background:#231a12; border:1px solid #4a370f; }
.panel-arare .ttl { color:#ffd166; }
.panel-arare ul { margin:2px 0 0 16px; color:#d8c9a5; }
.panel-tenkai { background:#0f1c17; border:1px solid #1e4033; }
.panel-tenkai .ttl { color:#7fe0a0; }
.panel-tenkai ul { margin:3px 0 0 16px; color:#bcd6c8; }
.panel-tenkai li { margin:2px 0; }
.panel-tenkai .note { font-size:10px; color:#6f8a7d; margin-top:5px; }
.panel-wind { background:#0f1e2b; border:1px solid #1c3a52; color:#a9c6dd; }
.panel-wind .ttl { color:#7ec8ff; }
.panel-tide { background:#0d1c1a; border:1px solid #1c3f39; color:#a9d6cc; }
.panel-tide .ttl { color:#7fe0c8; }
.panel-tide .note { font-size:10px; color:#6f8a82; margin-top:5px; }
.lv-高 { color:#ff6b6b; font-weight:bold; } .lv-中 { color:#ffd166; font-weight:bold; } .lv-低 { color:#69db7c; font-weight:bold; }

/* 並び替え */
.sortbar { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.sortbtn { font-size:11px; border:1px solid #24344a; background:#0f1a26; color:#9fb0c3; border-radius:6px; padding:4px 10px; cursor:pointer; }
.sortbtn.on { background:#1d2b3d; color:#ffd166; border-color:#3a5170; }

/* 艇カード */
.boat { background:#121c28; border:1px solid #1f2b3a; border-radius:10px; margin-top:8px; display:flex; overflow:hidden; }
.lane-bar { width:8px; flex:none; }
.boat-body { flex:1; padding:9px 12px; min-width:0; }
.boat-top { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.lane-num { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; flex:none; }
.klass { font-size:11px; font-weight:bold; border-radius:4px; padding:1px 6px; color:#fff; flex:none; }
.k-A1 { background:#c9184a; } .k-A2 { background:#e07a1f; } .k-B1 { background:#1d6fd6; } .k-B2 { background:#5c6773; }
.pname { font-size:16px; font-weight:bold; color:#fff; }
.badge-local { font-size:10px; color:#0b1219; background:#ffd166; border-radius:4px; padding:1px 5px; font-weight:bold; flex:none; }
.badge-f { font-size:10px; color:#fff; background:#c9184a; border-radius:4px; padding:1px 5px; font-weight:bold; flex:none; }
.badge-st { font-size:10px; color:#0b1219; background:#7ec8ff; border-radius:4px; padding:1px 5px; font-weight:bold; flex:none; }
.badge-mach { font-size:10px; color:#0b1219; background:#c98500; border-radius:4px; padding:1px 5px; font-weight:bold; flex:none; }
.badge-detail { display:inline-block; font-size:9px; padding:1px 5px; border-radius:8px; background:rgba(126,200,255,0.14); color:#7ec8ff; margin-left:4px; letter-spacing:.5px; vertical-align:middle; font-weight:normal; flex:none; }
.nick { font-size:11px; color:#c8a24a; font-style:italic; margin-top:2px; }
.boat-sub { font-size:11px; color:#8a94a3; margin-top:3px; }
.tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
.tag { font-size:10px; border-radius:4px; padding:1px 6px; border:1px solid #2a3a4d; color:#9fb0c3; }
.tag-mach-high { border-color:#6a4d18; color:#ffd166; } .tag-mach-low { border-color:#4a2f3a; color:#c98; }
.tag-local { border-color:#5a4a1a; color:#ffd166; }

.stats { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
.stat { line-height:1.35; min-width:66px; }
.stat .lb { font-size:10px; color:#8a94a3; }
.stat .v { font-size:15px; font-weight:bold; color:#e0e6ed; }
.stat .v2 { font-size:11px; color:#9fb0c3; }
.stat.hot .v { color:#ffd166; } .stat.hot .lb { color:#ffd166; }
.stat.mach .lb { color:#7ec8ff; } .stat.mach .v { color:#a9c6dd; }
.up { font-size:11px; }
/* 今節モーター（通算×今節の偏差・生データ／評価語なし） */
.kinmotor { margin-top:7px; font-size:11.5px; color:#a9c6dd; background:#0f1a26; border:1px solid #23364a; border-radius:8px; padding:5px 9px; line-height:1.5; }
.kinmotor b { color:#e0e6ed; }
.kinmotor .km-tsu { color:#8a94a3; }
.kinmotor .km-few { color:#e0a56a; font-size:10px; margin-left:4px; }
.kinmotor .km-none { color:#8a94a3; }

/* 相対バー（ST/機力） */
.meter { margin-top:7px; }
.meter-row { display:flex; align-items:center; gap:7px; margin-top:3px; }
.meter-lb { font-size:10px; color:#8a94a3; width:42px; flex:none; }
.meter-track { flex:1; height:7px; background:#0e1620; border-radius:4px; overflow:hidden; }
.meter-fill { height:100%; border-radius:4px; }
.meter-val { font-size:10px; color:#9fb0c3; width:46px; flex:none; text-align:right; }
.meter-best { color:#ffd166; font-weight:bold; }

/* E30該当場成績（事実の生データ・二層表示） */
.e30d { margin-top:8px; border:1px solid #24344a; border-radius:8px; background:#0f1a26; overflow:hidden; }
.e30d > summary { list-style:none; cursor:pointer; padding:7px 10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.e30d > summary::-webkit-details-marker { display:none; }
.e30-badge { font-size:10px; font-weight:bold; color:#0b1219; background:#8fd6c0; border-radius:4px; padding:1px 6px; flex:none; }
.e30-sum { font-size:11px; color:#a9c6dd; }
.e30-sum b { color:#e0e6ed; }
.e30-few { font-size:9px; color:#c98; margin-left:2px; }
.e30-caret { margin-left:auto; font-size:10px; color:#6f8aa3; }
.e30d[open] .e30-caret::after { content:"閉じる ▲"; } .e30d:not([open]) .e30-caret::after { content:"内訳 ▼"; }
.e30-body { padding:2px 10px 9px; }
.e30-row { display:flex; align-items:center; font-size:11px; padding:4px 0; border-top:1px solid #16273a; }
.e30-row.hd { color:#6f8aa3; font-weight:bold; border-top:none; }
.e30-row .c { width:40px; color:#c5d2e0; font-weight:bold; }
.e30-row .n { width:38px; text-align:right; color:#e0e6ed; }
.e30-row .w1 { width:30px; text-align:right; color:#ffd166; font-weight:bold; }
.e30-row .w2 { width:40px; text-align:right; color:#3fb1c9; font-weight:bold; }
.e30-row .st { width:46px; text-align:right; color:#e0e6ed; }
.e30-row .tk { flex:1; padding-left:8px; color:#8faabe; }
.e30-row.dim { opacity:.5; }
.e30-note { font-size:9px; color:#6f8aa3; margin-top:5px; line-height:1.5; }

/* 決まり手構成バー */
.kmr { margin-top:8px; }
.kmr-ttl { font-size:10px; color:#8a94a3; margin-bottom:3px; display:flex; justify-content:space-between; }
.kmr-bar { display:flex; height:9px; border-radius:5px; overflow:hidden; background:#0e1620; gap:2px; }
.kmr-seg { height:100%; }
.kmr-legend { display:flex; gap:9px; flex-wrap:wrap; margin-top:4px; font-size:9.5px; color:#9fb0c3; }
.kmr-legend span { display:flex; align-items:center; gap:3px; }
.kmr-dot { width:8px; height:8px; border-radius:2px; flex:none; }
.kmr-def { font-size:10px; color:#6f7d8c; margin-top:3px; }

/* 今節成績 */
.shu-wrap { margin-top:9px; }
.shu-cap { font-size:10px; color:#8a94a3; margin-bottom:3px; }
.shu { width:100%; border-collapse:separate; border-spacing:2px 0; font-size:10px; table-layout:fixed; }
.shu th { color:#7ec8ff; font-weight:normal; padding:2px 1px; }
.shu td { text-align:center; padding:3px 1px; color:#cdd6e0; line-height:1.35; white-space:nowrap; background:#0f1a26; border-radius:3px; }
.shu td.shu-empty { color:#33404f; background:#0c1420; }
.shu .r1 { color:#ffd166; font-weight:bold; } .shu .r2 { color:#cfe3ff; } .shu .r3 { color:#a9c6dd; }
.shu .rx { color:#8a94a3; }

.empty { text-align:center; color:#8a94a3; font-size:13px; padding:40px 0; }
.legend-note { font-size:10px; color:#6f7d8c; margin-top:14px; line-height:1.6; }

/* マイ・パネル（記憶と回収ループ） */
.my { border-radius:12px; margin:6px 0 4px; overflow:hidden; border:1px solid #1f2b3a; background:#101a26; }
.my-sec { padding:10px 12px; }
.my-sec + .my-sec { border-top:1px solid #1b2735; }
.my-h { font-size:12px; font-weight:bold; display:flex; align-items:center; gap:7px; margin-bottom:7px; }
.my-h .cnt { font-size:11px; color:#0b1219; background:#ffd166; border-radius:10px; padding:0 7px; font-weight:bold; }
.harvest .my-h { color:#ffd166; }
.watch .my-h { color:#7ec8ff; }
.recent .my-h { color:#9fb0c3; }
.my-row { display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:8px; background:#0d1622; margin-top:6px; cursor:pointer; }
.my-row:active { background:#152233; }
.my-rl { flex:1; min-width:0; }
.my-rt { font-size:13px; font-weight:bold; color:#e8edf3; }
.my-rs { font-size:10px; color:#8a94a3; margin-top:1px; }
.pill { font-size:10px; font-weight:bold; border-radius:10px; padding:2px 9px; white-space:nowrap; flex:none; }
.pill-done { color:#0b1219; background:#ffd166; }
.pill-wait { color:#ffd166; background:#2e2712; border:1px solid #5a4a1a; }
.pill-pre { color:#7fe0a0; background:#12241a; border:1px solid #1e4a30; }
.harvest-link { color:#0b1219; background:#ffd166; font-size:11px; font-weight:bold; border-radius:6px; padding:5px 10px; text-decoration:none; white-space:nowrap; flex:none; }
.harvest-x { font-size:11px; color:#8a94a3; border:1px solid #2a3a4d; border-radius:6px; padding:5px 8px; background:none; cursor:pointer; flex:none; }
.recent-chips { display:flex; gap:6px; flex-wrap:wrap; }
.rchip { font-size:11px; color:#a9c6dd; background:#0d1622; border:1px solid #24344a; border-radius:14px; padding:3px 10px; cursor:pointer; }
.my-empty { font-size:11px; color:#6f7d8c; }
.my-note { font-size:10px; color:#6f7d8c; margin:2px 2px 4px; line-height:1.5; }
.oshi-result { color:#0b1219; background:#ffd166; font-size:11px; font-weight:bold; border-radius:6px; padding:5px 10px; text-decoration:none; white-space:nowrap; flex:none; }
/* スター（気になる）ボタン */
.watchbtn { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:bold; border-radius:6px; padding:5px 12px; cursor:pointer; border:1px solid #3a5170; background:#0f1a26; color:#7ec8ff; transition:transform .12s; }
.watchbtn.on { background:#12233a; color:#ffd166; border-color:#5a4a1a; }
.watchbtn:active { transform:scale(.92); }
.hdr-harvest { display:inline-block; margin-top:6px; font-size:11px; font-weight:bold; color:#0b1219; background:#ffd166; border-radius:12px; padding:3px 11px; cursor:pointer; }
/* ポータルタブ */
.navtabs { display:flex; gap:7px; overflow-x:auto; margin:10px 0 2px; padding-bottom:3px; -webkit-overflow-scrolling:touch; }
.navtabs::-webkit-scrollbar { display:none; }
.navtab { flex:none; font-size:12px; font-weight:bold; text-decoration:none; color:#9fb0c3; background:#101a26; border:1px solid #24344a; border-radius:16px; padding:6px 13px; white-space:nowrap; }
.navtab.on { color:#0b1219; background:#ffd166; border-color:#ffd166; }
.navtab:active { background:#182535; }
.navtab.on:active { background:#e8bd50; }
/* 今日の運勢（あそび）：既定は折りたたみの控えめ表示 */
.fortune { border:1px solid #1f2b3a; background:#101a26; border-radius:10px; margin:6px 0 4px; }
.fortune-bar { display:flex; align-items:center; gap:7px; padding:8px 12px; cursor:pointer; font-size:12px; color:#9fb0c3; }
.fortune-dot { font-size:13px; opacity:.85; }
.fortune-title { font-weight:bold; color:#b9c4d2; }
.fortune-tag { font-size:9px; color:#7a7192; border:1px solid #2f2a44; border-radius:8px; padding:0 6px; }
.fortune-inline { font-size:12px; color:#c8b57a; letter-spacing:1px; }
.fortune-cta { font-size:11px; color:#8a94a3; }
.fortune-caret { margin-left:auto; color:#6f7d8c; font-size:11px; }
.fortune.open .fortune-bar { border-bottom:1px solid #1b2735; }
.fortune-body, .fortune-pick, .fortune-nopick { padding:0 12px; }
.fortune-nopick { font-size:12px; color:#9fb0c3; padding-top:8px; }
.fortune-msg { font-size:12.5px; color:#dfe5ee; padding:9px 12px 0; line-height:1.6; }
.fortune-sub { font-size:11px; color:#9fb0c3; padding:6px 12px 0; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.fortune-sub b { color:#cdd6e0; }
.fortune-pick { display:flex; gap:6px; flex-wrap:wrap; padding-top:8px; padding-bottom:2px; }
.zbtn { font-size:11px; color:#a9b4c4; background:#0d1622; border:1px solid #24344a; border-radius:12px; padding:4px 9px; cursor:pointer; }
.zbtn:active { background:#182535; }
.fortune-link { font-size:11px; color:#9db2c9; text-decoration:none; }
.fortune-more { font-size:10px; color:#6f7d8c; padding:7px 12px 11px; }
.fortune-reset { font-size:10px; color:#7a828f; cursor:pointer; text-decoration:underline; }
/* 推し */
.oshi { border-radius:12px; margin:6px 0 4px; border:1px solid #4a3a10; background:linear-gradient(135deg,#231a0e,#141c26); padding:10px 12px; }
.oshi-h { font-size:12px; font-weight:bold; color:#ffd166; display:flex; align-items:center; gap:7px; }
.oshi-cnt { font-size:11px; color:#0b1219; background:#ffd166; border-radius:10px; padding:0 7px; font-weight:bold; }
.oshi-empty { font-size:11px; color:#8a7a4a; margin-top:6px; }
.oshi-nick { font-size:10px; color:#c8a24a; font-style:italic; font-weight:normal; }
.oshibtn { margin-left:auto; font-size:16px; line-height:1; color:#5c6773; cursor:pointer; flex:none; padding:2px 3px; transition:transform .12s; }
.oshibtn.on { color:#ffd166; }
.oshibtn:active { transform:scale(1.3); }
.boat.oshi-on { border-color:#5a4a1a; box-shadow:0 0 0 1px #5a4a1a inset; }
.my-row.oshi-row { background:#191408; border:1px solid #4a3a10; }
/* ホーム画面に追加（PWA導線） */
.a2hs { max-width:660px; margin:0 auto; padding:9px 12px; display:flex; align-items:center; gap:10px; background:#12233a; border-bottom:1px solid #24344a; font-size:12px; color:#cdd6e0; }
.a2hs img { width:26px; height:26px; border-radius:6px; flex:none; }
.a2hs .a2t { flex:1; line-height:1.5; }
.a2hs .a2t b { color:#ffd166; }

  var lines=txt.replace(/\r/g,"").split("\n").filter(function(l){return l.length;});
  if(!lines.length) return;
  var h=lines[0].split(","), ix={}; h.forEach(function(c,i){ix[c]=i;});
  function num(a,c){ var v=parseFloat(a[ix[c]]); return isNaN(v)?0:v; }
  for(var i=1;i<lines.length;i++){
    var a=lines[i].split(","); if(a.length<h.length) continue;
    var t=a[ix["登録番号"]];
    KMR[t]={
      out:num(a,"出走数"), win:num(a,"1着数"),
      nige:num(a,"逃げ"), sashi:num(a,"差し"), makuri:num(a,"まくり"), makurizashi:num(a,"まくり差し"),
      maeritu:num(a,"前づけ率"), sasare:num(a,"さされ率"), makurare:num(a,"まくられ率")
    };
  }
}
function parseHL(j){
  if(!j) return;
  HL_META.fix = j["確定イン率場"]||[];

              tenkai:r["展開"]||[], boats:boats };
  });
}

var view={page:"venues", key:null, rno:null, sort:"枠"};
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nowJST(){ return new Date(Date.now()+9*3600*1000); }
function fmtNum(s){ var f=parseFloat(s); return isNaN(f)?"-":f.toFixed(2); }
function fmtPct(s){ var f=parseFloat(s); return isNaN(f)?"-":f.toFixed(1)+"%"; }
function toMin(dl){ var m=/^(\d{1,2}):(\d{2})$/.exec(dl); return m?parseInt(m[1])*60+parseInt(m[2]):null; }
function curMin(){ var n=nowJST(); return n.getUTCHours()*60+n.getUTCMinutes(); }
function curYmd(){ var n=nowJST(); return n.getUTCFullYear()*1e4+(n.getUTCMonth()+1)*100+n.getUTCDate(); }

/* ===== 記憶と回収ループ（localStorage・賭け要素なし。読む体験の“開いたループ”を閉じさせる） ===== */
function lsGet(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
var WATCH=lsGet("br_watch",[]);       /* 気になる（明示スター） */
var VIEWED=lsGet("br_viewed",[]);     /* 最近見た（自動） */
var COLLECTED=lsGet("br_collected",[]); /* 結果を回収済みのキー */
function rkey(jcd,hd,rno){ return jcd+"_"+hd+"_"+rno; }
/* レース状態: 'pre'(締切前) / 'wait'(結果待ち〜締切+12分) / 'done'(結果確定) */
function raceStatus(hd,dl){
  var dm=toMin(dl); if(dm===null||!/^\d{8}$/.test(hd)) return 'pre';
  var cur=curYmd(), h=parseInt(hd);
  if(cur>h) return 'done';
  if(cur<h) return 'pre';
  var diff=curMin()-dm;
  if(diff<0) return 'pre';
  return diff<12?'wait':'done';
}
function pruneOld(){
  /* 3日以上前のレースは間引く（無限肥大防止） */
  var cut=curYmd()-3;
  function keep(x){ return parseInt(x.hd||"0")>=cut; }
  WATCH=WATCH.filter(keep); VIEWED=VIEWED.filter(keep);
  COLLECTED=COLLECTED.filter(function(k){ return parseInt((k.split("_")[1]||"0"))>=cut; });
}
function isWatched(jcd,hd,rno){ var k=rkey(jcd,hd,rno); return WATCH.some(function(x){return rkey(x.jcd,x.hd,x.rno)===k;}); }
function toggleWatch(v,rno){
  var rc=v.races[rno], k=rkey(v.jcd,v.hd,rno);
  if(isWatched(v.jcd,v.hd,rno)){ WATCH=WATCH.filter(function(x){return rkey(x.jcd,x.hd,x.rno)!==k;}); }
  else { WATCH.unshift({jcd:v.jcd,hd:v.hd,rno:rno,venue:v.name,deadline:rc.deadline,kikaku:rc.kikaku,ts:Date.now()}); }
  lsSet("br_watch",WATCH);
}
function recordViewed(v,rno){
  var rc=v.races[rno], k=rkey(v.jcd,v.hd,rno);
  VIEWED=VIEWED.filter(function(x){return rkey(x.jcd,x.hd,x.rno)!==k;});
  VIEWED.unshift({jcd:v.jcd,hd:v.hd,rno:rno,venue:v.name,deadline:rc.deadline,ts:Date.now()});
  if(VIEWED.length>40) VIEWED=VIEWED.slice(0,40);
  lsSet("br_viewed",VIEWED);
}
function isCollected(jcd,hd,rno){ return COLLECTED.indexOf(rkey(jcd,hd,rno))>=0; }
function markCollected(jcd,hd,rno){ var k=rkey(jcd,hd,rno); if(COLLECTED.indexOf(k)<0){ COLLECTED.push(k); lsSet("br_collected",COLLECTED); } }
function resultUrl(jcd,hd,rno){ return "https://www.boatrace.jp/owpc/pc/race/raceresult?rno="+rno+"&jcd="+jcd+"&hd="+hd; }
/* 回収対象＝結果確定・未回収のレース。
   ソース: 気になる(WATCH) / 最近見た(VIEWED) / 推しの出走(自動)。
   推しが走ったレースはフォローだけで自動的に回収対象になる（明示操作不要）。 */
function harvestList(){
  var map={};
  function add(x, oshiName){
    /* 締切を過ぎたレースは公式結果リンクで確認（確定判定はアプリでは持たない） */
    if(!x.hd || raceStatus(x.hd,x.deadline)==='pre') return;
    if(isCollected(x.jcd,x.hd,x.rno)) return;
    var k=rkey(x.jcd,x.hd,x.rno);
    if(!map[k]) map[k]={jcd:x.jcd,hd:x.hd,rno:x.rno,venue:x.venue||"",deadline:x.deadline||"",kikaku:x.kikaku||"",oshi:false,oshiNames:[]};
    if(oshiName){ map[k].oshi=true; if(map[k].oshiNames.indexOf(oshiName)<0) map[k].oshiNames.push(oshiName); }
  }
  WATCH.forEach(function(x){ add(x); });
  VIEWED.forEach(function(x){ add(x); });
  oshiEntries().forEach(function(x){ add(x, x.name); });
  var out=Object.keys(map).map(function(k){ return map[k]; });
  out.sort(function(a,b){
    if(a.oshi!==b.oshi) return a.oshi?-1:1;               /* 推し優先 */
    var ka=a.hd+("0"+a.deadline).slice(-5), kb=b.hd+("0"+b.deadline).slice(-5);
    return ka>kb?-1:1;                                     /* 新しい順 */
  });
  return out;
}

function toggleOshi(toban,name){

}
/* 推しの本日/翌日の出走を全場から集める */
function oshiEntries(){
  if(!OSHI.length) return [];
  var set={}; OSHI.forEach(function(o){ set[String(o.toban)]=o.name; });
  var out=[];
  RAW.data.forEach(function(row){
    var tb=g(row,"登録番号");
    if(set[tb]===undefined) return;
    out.push({toban:tb, name:g(row,"氏名").replace(/　+/g,"　"), jcd:g(row,"場コード"),
      venue:g(row,"場名"), hd:g(row,"開催日"), rno:parseInt(g(row,"レース")), deadline:g(row,"締切時刻")});
  });
  out.sort(function(a,b){ return (a.hd+("0"+a.deadline).slice(-5)) < (b.hd+("0"+b.deadline).slice(-5)) ? -1 : 1; });
  return out;
}

/* ===== 今日の運勢（あそび・エンタメ。勝敗予想や買い目ではありません） =====

   運勢は“あなたの一日”についてのみ。特定の艇や買い目は一切示さない。 */
var ZODIAC=["牡羊座","牡牛座","双子座","蟹座","獅子座","乙女座","天秤座","蠍座","射手座","山羊座","水瓶座","魚座"];
var BR_SIGN=lsGet("br_sign","");
var FORTUNE_MSG=[
  ["空回りしやすい日。深追いせず“見”に徹すると吉。","情報は多いほど迷う日。要点だけ拾って身軽に。","急がば回れ。手堅い一手が後で効いてくる。"],
  ["ペースは掴みにくいが、粘れば形になる。","小さな発見がある日。メモしておくと後で活きる。","足元を固めるほど安定する一日。"],
  ["まずまずの流れ。いつも通りが一番強い。","可もなく不可もなく。基本に忠実がベスト。","淡々と積み上げると良い巡り合わせ。"],
  ["調子は上向き。直感が冴える日。","チャンスに気づきやすい日。動けば拾える。","流れは味方。思い切りが良い結果に。"],
  ["絶好調。読みがピタッとハマる日。","視界良好、直感も理屈も噛み合う一日。","勢いそのまま突き抜けて良い日。"]
];
function hashStr(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=(h*16777619)>>>0; } return h>>>0; }
function todayYmdStr(){ var n=nowJST(); return ""+n.getUTCFullYear()+("0"+(n.getUTCMonth()+1)).slice(-2)+("0"+n.getUTCDate()).slice(-2); }
function dailyFortune(sign){
  var seed=hashStr(sign+"|"+todayYmdStr());
  var level=seed%5;                     /* 0..4 → ★1..5 */
  var msgArr=FORTUNE_MSG[level], msg=msgArr[(seed>>3)%msgArr.length];
  var aisho=40+((seed>>7)%61);          /* 相性運 40-100 */
  var shobu=40+((seed>>13)%61);         /* 勝負運 40-100 */
  return {stars:level+1, msg:msg, aisho:aisho, shobu:shobu};
}
var FORT_OPEN=lsGet("br_fortune_open",false);
function buildFortune(){
  var hasSign=!!BR_SIGN, f=hasSign?dailyFortune(BR_SIGN):null;
  var starsInline=f?("★★★★★".slice(0,f.stars)+"☆☆☆☆☆".slice(0,5-f.stars)):"";
  var bar='<div class="fortune-bar" id="fortuneToggle">'
    +'<span class="fortune-dot">🔮</span><span class="fortune-title">今日の運勢</span><span class="fortune-tag">あそび</span>'
    +(hasSign?'<span class="fortune-inline">'+starsInline+' '+esc(BR_SIGN)+'</span>':'<span class="fortune-cta">タップで占う</span>')
    +'<span class="fortune-caret">'+(FORT_OPEN?'▴':'▾')+'</span></div>';
  if(!FORT_OPEN) return '<div class="fortune">'+bar+'</div>';
  var body='';
  if(!hasSign){
    body='<div class="fortune-nopick">星座をえらぶと、今日の運勢が出ます（毎日変わる・あそび）。</div>'
      +'<div class="fortune-pick">'+ZODIAC.map(function(z){return '<span class="zbtn" data-sign="'+esc(z)+'">'+esc(z)+'</span>';}).join("")+'</div>'
      +'<div style="height:8px"></div>';
  } else {
    body='<div class="fortune-msg">'+esc(f.msg)+'</div>'
      +'<div class="fortune-sub"><span>相性運 <b>'+f.aisho+'</b></span><span>勝負運 <b>'+f.shobu+'</b></span>'
      +'<span class="fortune-reset" id="fortuneReset">星座変更</span></div>'
      +'<div class="fortune-more">🔮 <a class="fortune-link" href="../uranai/">選手占いでもっと占う →</a></div>';
  }
  return '<div class="fortune open">'+bar+body+'</div>';
}
function wireFortune(app){
  var tg=app.querySelector("#fortuneToggle");
  if(tg) tg.onclick=function(){ FORT_OPEN=!FORT_OPEN; lsSet("br_fortune_open",FORT_OPEN); render(); };
  Array.prototype.forEach.call(app.querySelectorAll(".zbtn"),function(el){

function isClosed(hd,dl){
  var dm=toMin(dl); if(dm===null||!/^\d{8}$/.test(hd)) return false;
  var cur=curYmd();
  if(cur>parseInt(hd)) return true;
  if(cur<parseInt(hd)) return false;
  return curMin()>dm;
}
/* 締切までの残り（分）。過去日=締切、未来日=null（大きく先） */
function minsToClose(hd,dl){
  var dm=toMin(dl); if(dm===null||!/^\d{8}$/.test(hd)) return null;
  var cur=curYmd();
  if(cur>parseInt(hd)) return -1;
  if(cur<parseInt(hd)) return 9999;
  return dm-curMin();
}

function findArare(jcd,rno,hd){
  if(!arare||!arare.races) return null;
  var hit=null, hasHd=false;
  Object.keys(arare.races).forEach(function(k){
    var r=arare.races[k];
    if(String(r.jcd)!==String(jcd)||parseInt(r.rno)!==parseInt(rno)) return;
    if(r.hd){ hasHd=true; if(String(r.hd)===String(hd)) hit=r; }
    else if(!hit){ hit=r; }   /* 開催日フィールドが無い旧データ */
  });
  /* 旧データ(hd無し)は生成日ガードで別日を排除。新データはhd厳密一致済み */
  if(!hasHd && hd && arareHd && arareHd!==hd) return null;
  return hit;
}
function findWind(jcd,hd,dl){
  if(!weather||!weather.stadiums||!weather.stadiums[jcd]) return null;
  if(!/^\d{8}$/.test(hd)||!/^\d{1,2}:\d{2}$/.test(dl)) return null;
  var target=hd.slice(0,4)+"-"+hd.slice(4,6)+"-"+hd.slice(6,8)+"T"+("0"+dl).slice(-5);
  var tms=Date.parse(target+"+09:00"), best=null, bd=1e15;
  (weather.stadiums[jcd].hourly||[]).forEach(function(h){
    var d=Math.abs(Date.parse(h.time+"+09:00")-tms);
    if(d<bd){bd=d;best=h;}
  });
  return best;
}
var WIND_ARROW={"北":"↓","北東":"↙","東":"←","南東":"↖","南":"↑","南西":"↗","西":"→","北西":"↘"};
function windArrow(dir){ if(!dir) return ""; for(var k in WIND_ARROW){ if(dir.indexOf(k)>=0) return WIND_ARROW[k]; } return ""; }

/* ===== 描画 ===== */
function render(){
  var app=document.getElementById("app"), crumb=document.getElementById("crumb");
  document.getElementById("updated").textContent="更新: "+(RAW.updated||"-")+"｜出典: BOATRACE公式出走表 ほか";
  var keys=Object.keys(venues);
  if(keys.length===0){ app.innerHTML='<div class="empty">本日の出走表データがありません</div>'; crumb.innerHTML=""; return; }

  if(view.page==="venues"){ renderVenues(app,crumb,keys); return; }
  var v=venues[view.key];
  if(!v){ view={page:"venues",sort:view.sort}; render(); return; }
  if(view.page==="races"){ renderRaces(app,crumb,v); return; }
  renderRace(app,crumb,v);
}

function renderVenues(app,crumb,keys){
  crumb.innerHTML="場を選択";
  var byDate={};
  keys.forEach(function(k){ var v=venues[k]; (byDate[v.hd]=byDate[v.hd]||[]).push(v); });
  var dates=Object.keys(byDate).sort();
  var todayJST=(function(){ var n=nowJST(); return n.getUTCFullYear()+("0"+(n.getUTCMonth()+1)).slice(-2)+("0"+n.getUTCDate()).slice(-2); })();
  var html=buildOshiToday()+buildMyPanel()+buildFortune();
  dates.forEach(function(hd){
    var list=byDate[hd].sort(function(a,b){return a.jcd<b.jcd?-1:1;});
    var mm=hd.slice(4,6),dd=hd.slice(6,8);
    var dow=["日","月","火","水","木","金","土"][new Date(parseInt(hd.slice(0,4)),parseInt(mm)-1,parseInt(dd)).getDay()];
    html+='<div class="date-head">'+esc((hd===todayJST?"本日":"翌日")+" "+mm+"/"+dd+"("+dow+")")+'</div>';
    html+=list.map(function(v){
      var rs=Object.keys(v.races).map(Number).sort(function(a,b){return a-b;});
      var first=v.races[rs[0]],last=v.races[rs[rs.length-1]];
      var fix=HL_META.fix.indexOf(v.name)>=0?'<span class="chip chip-fix" style="margin-left:6px">進入固定</span>':'';
      return '<div class="venue-card" data-k="'+esc(v.key)+'">'
        +'<div class="venue-name">'+esc(v.name)+'</div>'
        +'<div class="venue-meta">'+esc(v.setsu)+fix+'<br>'+rs.length+'R｜'+esc(first.deadline)+'〜'+esc(last.deadline)+'</div>'
        +'<div class="venue-day">'+esc(v.day)+'</div></div>';
    }).join("");
  });
  app.innerHTML=html;
  Array.prototype.forEach.call(app.querySelectorAll(".venue-card"),function(el){
    el.onclick=function(){ view={page:"races",key:el.getAttribute("data-k"),rno:null,sort:view.sort}; render(); window.scrollTo(0,0); };
  });
  wireMyPanel(app);
  wireFortune(app);
}

/* 決まり手構成バー */
function kimariteBar(km){
  if(!km) return "";
  var cats=[["逃げ",km.nige],["差し",km.sashi],["まくり",km.makuri],["まくり差し",km.makurizashi]];
  var sum=cats.reduce(function(s,c){return s+c[1];},0);
  if(sum<=0) return '<div class="kmr"><div class="kmr-ttl"><span>決まり手構成</span><span>データ僅少</span></div></div>';
  var segs=cats.filter(function(c){return c[1]>0;}).map(function(c){
    var pc=Math.round(c[1]/sum*100);
    return '<div class="kmr-seg" style="width:'+(c[1]/sum*100)+'%;background:'+KMR_COLS[c[0]]+'" title="'+c[0]+' '+pc+'%"></div>';
  }).join("");
  var legend=cats.map(function(c){
    var pc=sum?Math.round(c[1]/sum*100):0;
    return '<span><span class="kmr-dot" style="background:'+KMR_COLS[c[0]]+'"></span>'+c[0]+' '+pc+'%</span>';
  }).join("");
  return '<div class="kmr"><div class="kmr-ttl"><span>決まり手構成（1着'+km.win+'/'+km.out+'走）</span></div>'
    +'<div class="kmr-bar">'+segs+'</div><div class="kmr-legend">'+legend+'</div></div>';
}

/* 今節モーター2連率（今節成績カラムの着から算出）。モーターは節を通じ艇に固定＝
   選手の今節結果＝そのモーターの今節結果。生データのみ・評価語なし。 */
function kinsetuMotor(row){
  var chaku=[];
  ["1日目成績","2日目成績","3日目成績","4日目成績","5日目成績","6日目成績"].forEach(function(k){
    var cell=(g(row,k)||"").trim(); if(!cell) return;
    cell.split(/\s+/).forEach(function(e){
      var p=e.split("/");                 // レース/進入/ST/着
      if(p.length===4 && /^\d+$/.test(p[3])) chaku.push(parseInt(p[3],10));
    });
  });
  var n=chaku.length, w2=chaku.filter(function(c){return c===1||c===2;}).length;
  return {n:n, w2:w2, rate:n?Math.round(w2/n*100):null};
}
function kinMotorLine(row){
  var tsu=g(row,"モーター2連率"), moNo=g(row,"モーターNo");
  var k=kinsetuMotor(row);
  if(k.n===0){
    return '<div class="kinmotor">今節モーター No.'+esc(moNo)+'：<span class="km-none">今節データなし</span>'
      +'<span class="km-tsu">／通算2連率 '+fmtPct(tsu)+'</span></div>';
  }
  var few=k.n<5;   // 節序盤の少数走はN少を明示（%は参考）
  return '<div class="kinmotor">今節モーター No.'+esc(moNo)+'：<b>'+k.n+'走</b> 2連対<b>'+k.w2+'</b>（'+k.rate+'%）'
    +(few?'<span class="km-few">N少</span>':'')
    +'<span class="km-tsu">／通算2連率 '+fmtPct(tsu)+'</span></div>';
}

/* 企画レースの当日判定（企画名文字列のキーワードのみ・保守的）。
   企画系(進入固定/A級系/選抜)=teal、節ステージ(準優/優勝戦)=gold で区分を分ける。
   場別マーケ名(エイトビート等)は名称から形式を判定できないため型バッジを付けない（誤情報回避）。 */
function kikakuChips(kikaku, venueIsFix){
  var s=String(kikaku||""); var out=[];
  // 企画系（teal）
  if(/進入固定/.test(s) && !venueIsFix) out.push('<span class="chip chip-plan">進入固定</span>');
  if(/Ａ級|A級|三Ａ|３Ａ/.test(s))       out.push('<span class="chip chip-plan">A級系</span>');
  if(/選抜/.test(s))                      out.push('<span class="chip chip-plan">選抜</span>');
  // 節ステージ（gold・企画とは別区分）。準優勝戦は「優勝戦」を含むため先に判定。
  if(/準優/.test(s))          out.push('<span class="chip chip-stage">準優勝戦</span>');
  else if(/優勝戦/.test(s))   out.push('<span class="chip chip-stage">優勝戦</span>');
  return out;
}

/* E30該当場成績（この場がE30該当場のときのみ・事実の生データ・二層表示） */
var E30_TECH=["逃げ","差し","まくり","まくり差し","抜き","恵まれ"];
function e30Block(toban,jcd){
  if(!E30||!E30META) return "";
  if(!E30META.対象場||!E30META.対象場[jcd]) return "";   /* 該当場のみ */
  var ep=E30[toban]; if(!ep) return "";
  var courses=Object.keys(ep["コース別"]).map(Number).sort(function(a,b){return a-b;});
  var w1=0,w2=0;
  courses.forEach(function(c){ var r=ep["コース別"][c]; w1+=r["1着数"]; w2+=r["2連対数"]; });
  var tot=ep["総出走数"], few=tot<10;
  var rows=courses.map(function(c){
    var r=ep["コース別"][c], rf=r["出走数"]<10;
    var tech=E30_TECH.filter(function(t){return r["決まり手"][t];}).map(function(t){return t+r["決まり手"][t];}).join("・");
    var st=(r["平均ST"]!=null)?r["平均ST"].toFixed(2):"-";
    return '<div class="e30-row'+(rf?' dim':'')+'"><span class="c">'+c+'号</span>'
      +'<span class="n">'+r["出走数"]+(rf?'<span class="e30-few">少</span>':'')+'</span>'
      +'<span class="w1">'+r["1着数"]+'</span><span class="w2">'+r["2連対数"]+'</span>'
      +'<span class="st">'+st+'</span><span class="tk">'+esc(tech||"-")+'</span></div>';
  }).join("");
  var per=E30META.期間, fmtP=function(d){return d?(d.slice(0,4)+"."+d.slice(4,6)+"."+d.slice(6,8)):"-";};
  var venue=E30META.対象場[jcd]["場名"];
  return '<details class="e30d"><summary>'
    +'<span class="e30-badge">E30該当場</span>'
    +'<span class="e30-sum">当地'+esc(venue)+'含む該当場 <b>'+tot+'</b>走 ・ 1着<b>'+w1+'</b> ・ 2連対<b>'+w2+'</b>'+(few?'<span class="e30-few"> N少</span>':'')+'</span>'
    +'<span class="e30-caret"></span></summary>'
    +'<div class="e30-body">'
    +'<div class="e30-row hd"><span class="c">コース</span><span class="n">出走</span><span class="w1">1着</span><span class="w2">2連対</span><span class="st">平均ST</span><span class="tk">決まり手</span></div>'
    +rows
    +'<div class="e30-note">E30該当場（'+esc(Object.keys(E30META.対象場).map(function(k){return E30META.対象場[k]["場名"];}).join("・"))+'）通算の進入コース別・生データ。'
    +(per?fmtP(per["開始"])+'〜'+fmtP(per["終了"]):'')+'。1着の決まり手内訳を併記。平均STはF/欠場等を除外。N数の小さいコースは参考値。出典：'+esc(E30META.出典||"BoatraceOpenAPI/resultsミラー（mbrace由来）")+'。</div>'
    +'</div></details>';
}

function renderRace(app,crumb,v){
  var rc=v.races[view.rno];
  if(!rc){ view={page:"races",key:view.key,sort:view.sort}; render(); return; }
  recordViewed(v,view.rno);   /* 見たレースを記憶（回収ループの起点） */

  var hlKey=v.jcd+"_"+view.rno+"R";
  var hl=(HL[hlKey]&&HL_META.hd===v.hd)?HL[hlKey]:null;

  /* ヘッダ＋締切カウントダウン */
  function fmtMins(m){ if(m<60) return m+"分"; return Math.floor(m/60)+"時間"+(m%60)+"分"; }
  var mins=minsToClose(v.hd,rc.deadline), cdCls="cd-open", cdTxt="";
  if(mins===null){ cdTxt=""; }
  else if(mins<0){ cdCls="cd-closed"; cdTxt="締切済み"; }
  else if(mins>=9999){ cdCls="cd-open"; cdTxt="翌日開催"; }
  else if(mins<=15){ cdCls="cd-soon"; cdTxt="締切まで"+fmtMins(mins); }
  else { cdCls="cd-open"; cdTxt="締切まで"+fmtMins(mins); }
  var cdHtml=cdTxt?'<span class="cd '+cdCls+'">'+esc(cdTxt)+'</span>':'';

  /* 気になる（記憶）＋公式リンク（出走表・結果） */
  var wOn=isWatched(v.jcd,v.hd,view.rno);

  if(/^\d{8}$/.test(v.hd)){
    var base="https://www.boatrace.jp/owpc/pc/race/", q="?rno="+view.rno+"&jcd="+v.jcd+"&hd="+v.hd;
    var closed=isClosed(v.hd,rc.deadline);
    off='<a class="offlink '+(closed?"offlink-result":"offlink-pend")+'" href="'+base+'raceresult'+q+'" target="_blank" rel="noopener">🏁 '+(closed?"レース結果（公式）":"結果（締切後に確定）")+' ↗</a>'
      +'<a class="offlink offlink-card" href="'+base+'racelist'+q+'" target="_blank" rel="noopener">公式出走表 ↗</a>';
  }
  var links='<div class="race-links">'+wbtn+off+'</div>';
  var html='<div class="race-head"><div class="line1"><span class="rt">'+esc(v.name)+' '+view.rno+'R</span><span class="kikaku">'+esc(rc.kikaku)+'</span></div>'
    +'<div class="dl">'+cdHtml+'<span>締切 '+esc(rc.deadline||"-")+'</span><span>'+esc(v.setsu)+' '+esc(v.day)+'</span></div>'
    +links+'</div>';

  /* サマリーチップ */
  var ar=findArare(v.jcd,view.rno,v.hd), wd=findWind(v.jcd,v.hd,rc.deadline);

  if(hl&&hl.in1!=null) chips.push('<span class="chip">イン1着率 <b>'+esc(hl.in1)+'%</b></span>');
  if(hl&&hl.haran!=null) chips.push('<span class="chip">波乱度 <b>'+esc(hl.haran)+'</b></span>');
  var venueIsFix=HL_META.fix.indexOf(v.name)>=0;
  if(venueIsFix) chips.push('<span class="chip chip-fix">進入固定</span>');
  kikakuChips(rc.kikaku, venueIsFix).forEach(function(c){ chips.push(c); });
  if(wd) chips.push('<span class="chip">風 <b>'+esc(windArrow(wd.dir)+" "+wd.dir)+'</b> '+esc(wd.wind)+'m</span>');
  if(hl) chips.push('<a class="chip chip-link" href="../highlights/">📖 見立てを読む</a>');
  if(chips.length) html+='<div class="chips">'+chips.join("")+'</div>';

  /* 荒れ要因 */
  if(ar&&ar.factors&&ar.factors.length){
    html+='<div class="panel panel-arare"><div class="ttl">荒れサイン</div><ul>'+ar.factors.map(function(f){return '<li>'+esc(f)+'</li>';}).join("")+'</ul></div>';
  }
  /* 展開（複数シナリオ・断定なし。見立て/波及は非表示） */
  if(hl&&hl.tenkai&&hl.tenkai.length){
    html+='<div class="panel panel-tenkai"><div class="ttl">展開の見どころ</div><ul>'
      +hl.tenkai.map(function(t){return '<li>'+esc(t)+'</li>';}).join("")
      +'</ul><div class="note">※データに基づく複数シナリオの併置。勝敗の断定・買い目ではありません。</div></div>';
  }
  /* 風詳細 */
  if(wd){
    html+='<div class="panel panel-wind"><div class="ttl">締切時刻の風予報</div>'
      +esc((windArrow(wd.dir)+" ")+wd.dir)+' '+esc(wd.wind)+'m｜'+esc(wd.wx)+'（'+esc(String(wd.time).replace("T"," ").slice(5))+' 時点）</div>';
  }
  /* 当日干満（潮汐場のみ・水面コンディションの事実。見どころと同じ思想） */
  if(tide && tide['stadiums'] && tide['stadiums'][v.jcd]){
    var ts=tide['stadiums'][v.jcd], tp=[];

    if(ts['満潮']&&ts['満潮'].length) tp.push('満潮 '+ts['満潮'].map(esc).join('・'));
    if(ts['干潮']&&ts['干潮'].length) tp.push('干潮 '+ts['干潮'].map(esc).join('・'));
    if(tp.length){
      html+='<div class="panel panel-tide"><div class="ttl">当日の潮（水面コンディションの事実）</div>'
        +tp.join('｜')
        +'<div class="note">事実の提示のみ。勝敗・荒れ予想には用いません。</div></div>';
    }
  }

  /* 並び替え */
  var sorts=[["枠","枠順"],["ST","平均ST"],["機力","機力"],["当地","当地勝率"]];
  html+='<div class="sortbar">'+sorts.map(function(s){
    return '<span class="sortbtn'+(view.sort===s[0]?" on":"")+'" data-s="'+s[0]+'">'+esc(s[1])+'順</span>';
  }).join("")+'</div>';

  /* 相対比較用の基準値 */
  var boats=rc.boats.slice();
  var sts=boats.map(function(r){return parseFloat(g(r,"平均ST"));}).filter(function(x){return !isNaN(x);});
  var minST=Math.min.apply(null,sts), maxST=Math.max.apply(null,sts);
  var motors=boats.map(function(r){return parseFloat(g(r,"モーター2連率"));}).filter(function(x){return !isNaN(x);});
  var maxMotor=Math.max.apply(null,motors);

  /* 並び替え適用 */
  function sortKey(r){
    if(view.sort==="ST"){ var s=parseFloat(g(r,"平均ST")); return isNaN(s)?99:s; }
    if(view.sort==="機力"){ var m=parseFloat(g(r,"モーター2連率")); return isNaN(m)?-1:-m; }
    if(view.sort==="当地"){ var t=parseFloat(g(r,"当地勝率")); return isNaN(t)?-1:-t; }
    return parseInt(g(r,"枠"));
  }
  boats.sort(function(a,b){ return sortKey(a)-sortKey(b); });

  html+=boats.map(function(row){ return boatCard(row,v,hl,minST,maxST,maxMotor); }).join("");

  html+='<div class="legend-note">出典: BOATRACE公式出走表（勝率・モーター・今節成績）｜決まり手・被され率は直近183日集計｜機力評価・展開・荒れ指数は当ポータル生成｜風はOpen-Meteo。<br>本ページは水面傾向・展開の可視化に留め、勝敗の断定・買い目・確率は提示しません。</div>';

  app.innerHTML=html;
  document.getElementById("back0").onclick=function(e){e.preventDefault();view={page:"venues",sort:view.sort};render();};
  document.getElementById("back1").onclick=function(e){e.preventDefault();view={page:"races",key:view.key,sort:view.sort};render();};
  Array.prototype.forEach.call(app.querySelectorAll(".sortbtn"),function(el){
    el.onclick=function(){ view.sort=el.getAttribute("data-s"); render(); };
  });
  var wb=document.getElementById("watchbtn");
  if(wb) wb.onclick=function(){ toggleWatch(v,view.rno); render(); };
  Array.prototype.forEach.call(app.querySelectorAll(".oshibtn"),function(el){
    el.onclick=function(e){ e.stopPropagation(); toggleOshi(el.getAttribute("data-toban"),el.getAttribute("data-name")); render(); };
  });
}

function boatCard(row,v,hl,minST,maxST,maxMotor){
  var lane=parseInt(g(row,"枠"));
  var lc=LANE_COLOR[lane]||["#333","#fff"];
  var kl=g(row,"級別");
  var zk=parseFloat(g(row,"全国勝率")), tk=parseFloat(g(row,"当地勝率"));
  var hot=!isNaN(zk)&&!isNaN(tk)&&tk>zk;
  var fn=parseInt(g(row,"F数"))||0;
  var local=g(row,"支部")===HOME_BRANCH[v.jcd];
  var name=g(row,"氏名").replace(/　+/g,"　");
  var toban=g(row,"登録番号");
  var km=KMR[toban], pf=PROF[toban]||{}, hb=(hl&&hl.boats[lane])||null;

  var st=parseFloat(g(row,"平均ST"));
  var fastest=!isNaN(st)&&st===minST;
  var motor=parseFloat(g(row,"モーター2連率"));
  var bestMotor=!isNaN(motor)&&motor===maxMotor;
  var machEval=hb?hb["機力評価"]:null, sharpST=hb?hb["鋭ST"]:false, localAdv=hb?hb["当地優位"]:false;

  var nick=pf.nickname||pf.tagline||"";
  var badges=''
    +(fastest?'<span class="badge-st">最速ST</span>':'')
    +(bestMotor?'<span class="badge-mach">機力上位</span>':'')
    +(local?'<span class="badge-local">地元</span>':'')
    +(fn>0?'<span class="badge-f">F'+fn+'</span>':'');

  /* 相対バー: ST（小さいほど良い→反転）, モーター */
  var stPct=(!isNaN(st)&&maxST>minST)?((maxST-st)/(maxST-minST)*100):(!isNaN(st)?100:0);
  var moPct=(!isNaN(motor)&&maxMotor>0)?(motor/maxMotor*100):0;
  var meter='<div class="meter">'
    +'<div class="meter-row"><span class="meter-lb">ST</span><div class="meter-track"><div class="meter-fill" style="width:'+stPct.toFixed(0)+'%;background:'+(fastest?"#ffd166":"#3987e5")+'"></div></div><span class="meter-val'+(fastest?" meter-best":"")+'">'+(isNaN(st)?"-":st.toFixed(2))+'</span></div>'
    +'<div class="meter-row"><span class="meter-lb">機力</span><div class="meter-track"><div class="meter-fill" style="width:'+moPct.toFixed(0)+'%;background:'+(bestMotor?"#c98500":"#256abf")+'"></div></div><span class="meter-val'+(bestMotor?" meter-best":"")+'">'+fmtPct(g(row,"モーター2連率"))+'</span></div>'
    +'</div>';

  /* タグ */
  var tags=[];
  if(sharpST) tags.push('<span class="tag" style="border-color:#3a5170;color:#7ec8ff">鋭いST</span>');
  if(localAdv||hot) tags.push('<span class="tag tag-local">当地得意</span>');
  if(machEval==="high") tags.push('<span class="tag tag-mach-high">機力◎</span>');
  else if(machEval==="low") tags.push('<span class="tag tag-mach-low">機力△</span>');
  if(km&&km.sasare>=35) tags.push('<span class="tag" style="border-color:#4a2f3a;color:#c98">被され'+Math.round(km.sasare)+'%</span>');
  if(km&&km.makurare>=35) tags.push('<span class="tag" style="border-color:#4a2f3a;color:#c98">被まくり'+Math.round(km.makurare)+'%</span>');
  var tagsHtml=tags.length?'<div class="tags">'+tags.join("")+'</div>':'';

  var nameHtml=toban
    ?'<a class="pname" href="../players/?toban='+esc(toban)+'" style="color:inherit;text-decoration:none;">'+esc(name)+'<span class="badge-detail">詳細</span></a>'
    :'<span class="pname">'+esc(name)+'</span>';
  var oshi=isOshi(toban);
  var oshiBtn=toban?'<span class="oshibtn'+(oshi?' on':'')+'" data-toban="'+esc(toban)+'" data-name="'+esc(name)+'" title="推しフォロー">'+(oshi?'⭐':'☆')+'</span>':'';

  return '<div class="boat'+(oshi?' oshi-on':'')+'"><div class="lane-bar" style="background:'+lc[0]+'"></div><div class="boat-body">'
    +'<div class="boat-top">'
    +'<span class="lane-num" style="background:'+lc[0]+';color:'+lc[1]+';'+((lane===1||lane===2)?'border:1px solid #445;':'')+'">'+lane+'</span>'
    +'<span class="klass k-'+esc(kl)+'">'+esc(kl)+'</span>'+nameHtml+badges+oshiBtn
    +'</div>'
    +(nick?'<div class="nick">“'+esc(nick)+'”</div>':'')
    +'<div class="boat-sub">'+esc(g(row,"支部"))+'／'+esc(g(row,"出身"))+'・'+esc(g(row,"年齢"))+'歳</div>'
    +tagsHtml
    +'<div class="stats">'
    +'<div class="stat"><div class="lb">全国勝率</div><div class="v">'+fmtNum(g(row,"全国勝率"))+'</div><div class="v2">2連 '+fmtPct(g(row,"全国2連率"))+'</div></div>'
    +'<div class="stat'+(hot?' hot':'')+'"><div class="lb">当地勝率'+(hot?'<span class="up"> ↑</span>':'')+'</div><div class="v">'+fmtNum(g(row,"当地勝率"))+'</div><div class="v2">2連 '+fmtPct(g(row,"当地2連率"))+'</div></div>'
    +'<div class="stat mach"><div class="lb">モーター'+(g(row,"モーターNo")?' No.'+esc(g(row,"モーターNo")):'')+'</div><div class="v">'+fmtPct(g(row,"モーター2連率"))+'</div><div class="v2">3連 '+fmtPct(g(row,"モーター3連率"))+'</div></div>'
    +'</div>'
    +meter
    +kinMotorLine(row)
    +kimariteBar(km)
    +e30Block(toban,v.jcd)
    +shuTable(row)
    +'</div></div>';
}

function rerender(){ render(); }
render();
/* 締切カウントダウンを毎分更新（race画面のみ再描画） */
setInterval(function(){ if(view.page==="race") render(); }, 30000);
</script>
<script>
/* PWA: Service Worker 登録 ＋「ホーム画面に追加」導線 */
(function(){
  if("serviceWorker" in navigator){
    window.addEventListener("load",function(){ navigator.serviceWorker.register("../sw.js").catch(function(){}); });
  }
  var el=document.getElementById("a2hs");
  if(!el) return;
  function standalone(){ return window.matchMedia("(display-mode: standalone)").matches || navigator.standalone===true; }
  function dismissed(){ try{ return localStorage.getItem("br_a2hs")==="1"; }catch(e){ return false; } }
  function dismiss(){ try{ localStorage.setItem("br_a2hs","1"); }catch(e){} el.hidden=true; }
  if(standalone()||dismissed()) return;
  var ICON='<img src="../icon180.png" alt="">';
  var deferred=null;
  window.addEventListener("beforeinstallprompt",function(ev){
    ev.preventDefault(); deferred=ev;
    el.innerHTML=ICON+'<div class="a2t"><b>ホーム画面に追加</b>：アプリのように1タップで開けます。</div>'
      +'<button class="a2add" id="a2add">追加</button><button class="a2x" id="a2x">×</button>';
    el.hidden=false;
    document.getElementById("a2x").onclick=dismiss;
    document.getElementById("a2add").onclick=function(){
      el.hidden=true; deferred.prompt();
      deferred.userChoice.finally(function(){ deferred=null; dismiss(); });
    };
  });
  // iOS Safari は beforeinstallprompt が無いので手順を案内
  var ua=navigator.userAgent||"";
  var isIOS=/iPhone|iPad|iPod/.test(ua) && !window.MSStream;
  var isSafari=/Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
  if(isIOS && isSafari){
    el.innerHTML=ICON+'<div class="a2t"><b>ホーム画面に追加</b>：共有 <span style="font-size:14px">⬆️</span> →「ホーム画面に追加」でアプリのように使えます。</div>'
      +'<button class="a2x" id="a2x">×</button>';
    el.hidden=false;
    document.getElementById("a2x").onclick=dismiss;
  }
})();
</script>
