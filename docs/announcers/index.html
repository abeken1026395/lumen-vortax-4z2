<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実況アナ図鑑 | データ攻め</title>
<style>
  :root{
    --bg:#0b1219; --card:#121c26; --card2:#16222e;
    --line:#1f2e3c; --txt:#e7eef5; --sub:#8aa0b4;
    --accent:#ffd166; --accent-dim:#caa23f; --water:#5bc8e0; --pink:#ff7eb6;
    --r-kanto:#5b8def; --r-tokai:#3fb96b; --r-kinki:#e8954a;
    --r-shikoku:#a371f7; --r-chugoku:#3fb1c9; --r-kyushu:#f0606a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.6;padding-bottom:60px}
  a{color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px}

  .hero{position:relative;padding:30px 0 18px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow:hidden}
  .hero .mic{display:flex;align-items:center;gap:12px}
  .hero .micicon{flex:none;width:44px;height:44px;border-radius:12px;background:linear-gradient(145deg,#1d2c3a,#0e1822);border:1px solid var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(255,209,102,.15)}
  h1{font-size:24px;font-weight:800;letter-spacing:.02em;line-height:1.2}
  h1 .dot{color:var(--accent)}
  .lead{color:var(--sub);font-size:13px;margin-top:8px;max-width:560px}
  .bars{position:absolute;right:-4px;top:26px;display:flex;align-items:flex-end;gap:3px;height:46px;opacity:.55}
  .bars span{width:4px;background:linear-gradient(var(--accent),var(--accent-dim));border-radius:2px;animation:eq 1.1s ease-in-out infinite}
  .bars span:nth-child(1){height:40%;animation-delay:0s}
  .bars span:nth-child(2){height:75%;animation-delay:.15s}
  .bars span:nth-child(3){height:55%;animation-delay:.3s}
  .bars span:nth-child(4){height:95%;animation-delay:.1s}
  .bars span:nth-child(5){height:30%;animation-delay:.25s}
  .bars span:nth-child(6){height:65%;animation-delay:.05s}
  .bars span:nth-child(7){height:45%;animation-delay:.35s}
  @keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
  @media (prefers-reduced-motion:reduce){.bars span{animation:none}}

  .note{background:#1a2330;border:1px solid var(--line);border-left:3px solid var(--accent-dim);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--sub);margin-bottom:18px}
  .note b{color:var(--accent)}

  .sec-label{display:flex;align-items:center;gap:9px;margin:0 0 12px}
  .sec-label .tag{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--accent)}
  .sec-label .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--accent-dim),transparent)}
  .feat-scroll{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(220px,1fr);gap:11px;overflow-x:auto;padding:2px 2px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .feat-scroll::-webkit-scrollbar{height:6px}
  .feat-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .feat{scroll-snap-align:start;background:linear-gradient(160deg,#1a2738,#101a25);border:1px solid var(--accent-dim);border-radius:14px;padding:15px 15px 14px;position:relative;cursor:pointer;transition:transform .15s}
  .feat:active{transform:scale(.985)}
  .feat .star{position:absolute;top:11px;right:13px;font-size:13px;color:var(--accent)}
  .feat .fn{font-size:18px;font-weight:800;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .feat .fy{font-size:11px;color:var(--sub);font-weight:400}
  .feat .fnick{display:inline-block;margin-top:7px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#3a2d08,#5a4710);color:var(--accent);border:1px solid var(--accent-dim);padding:2px 10px;border-radius:999px}
  .feat .fv{margin-top:9px;font-size:11px;color:var(--water)}
  .feat .fd{margin-top:8px;font-size:12px;color:#c5d2e0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  .controls{display:flex;flex-direction:column;gap:10px;margin:8px 0 14px}
  .search{width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  .search::placeholder{color:#5e7184}
  .filters{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:6px 11px;background:var(--card);border:1px solid var(--line);border-radius:999px;color:var(--sub);font-size:12.5px;cursor:pointer;user-select:none;transition:.12s}
  .chip.on{background:var(--accent);color:#1a1305;border-color:var(--accent);font-weight:700}
  .chip[data-region].on{color:#fff}
  .count{color:var(--sub);font-size:12px;margin-bottom:10px}

  .anc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:9px;overflow:hidden;position:relative}
  .anc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rc,#2a3d52)}
  .head{display:flex;align-items:center;gap:12px;padding:12px 14px 12px 17px;cursor:pointer}
  .mk{flex:none;width:36px;height:36px;border-radius:9px;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px}
  .main{flex:1;min-width:0}
  .nm{font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .nm .fem{color:var(--pink);font-size:12px}
  .yomi{font-size:11px;color:var(--sub);font-weight:400}
  .nick{font-size:10.5px;background:#3a2d08;color:var(--accent);border:1px solid #5a4710;padding:1px 7px;border-radius:999px;font-weight:600}
  .vlist{margin-top:3px;display:flex;flex-wrap:wrap;gap:4px}
  .vtag{font-size:10.5px;background:var(--card2);border:1px solid var(--line);color:var(--sub);padding:1px 8px;border-radius:6px}
  .rzone{flex:none;font-size:10px;color:var(--rc,#6b7f95);font-weight:700;letter-spacing:.04em}
  .arrow{flex:none;color:var(--sub);font-size:12px;transition:transform .2s;margin-left:2px}
  .anc.open .arrow{transform:rotate(90deg)}
  .body{display:none;padding:0 14px 14px 17px;border-top:1px solid var(--line)}
  .anc.open .body{display:block}
  .body .row{font-size:13px;margin-top:10px}
  .specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:7px;margin-top:11px}
  .spec{background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:6px 9px}
  .spec .sl{font-size:9.5px;color:var(--accent-dim);letter-spacing:.05em;font-weight:700}
  .spec .sv{font-size:13px;color:var(--txt);margin-top:1px}
  .body .lbl{color:var(--accent-dim);font-size:11px;letter-spacing:.04em;margin-bottom:2px;font-weight:700}
  .body .src a{color:var(--water);font-size:12px;word-break:break-all}
  .empty{color:var(--sub);text-align:center;padding:30px 0;font-size:14px}
  footer{color:var(--sub);font-size:11px;text-align:center;margin-top:26px;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="mic">
      <div class="micicon">🎙</div>
      <div><h1>実況アナ図鑑<span class="dot">.</span></h1></div>
    </div>
    <div class="lead">レースを彩るのは選手だけじゃない。全国24場、それぞれの水面に「声の主」がいる。場の顔を知ると、ボートレースはもっと面白い。</div>
  </div>

  <div class="note">
    <b>ご注意</b>　実況アナ情報は当サイト調べ（公開情報・聞き取りベース）です。実況は<b>交代制・臨時担当</b>があり、ここに載らない担当回もあります。異動・誤りに気づいたらご指摘ください。
  </div>

  <div id="featWrap" style="display:none">
    <div class="sec-label"><span class="tag">🔥 名物実況</span><span class="ln"></span></div>
    <div class="feat-scroll" id="featList"></div>
  </div>

  <div class="sec-label" style="margin-top:6px"><span class="tag">全アナ一覧</span><span class="ln"></span></div>
  <div class="controls">
    <input class="search" id="q" placeholder="名前・ふりがな・場名・異名で検索">
    <div class="filters" id="regionFilters"></div>
    <div class="filters">
      <span class="chip" data-sort="venue">場順</span>
      <span class="chip" data-sort="name">名前順</span>
      <span class="chip" id="nickOnly">異名つきのみ</span>
    </div>
  </div>

  <div class="count" id="count"></div>
  <div id="list"></div>

  <footer>
    データ攻め｜実況アナ図鑑<br>
    買い目・予想は出しません。検証できるデータと、楽しむための読み物を。
  </footer>
</div>

<script>
const VENUE_ORDER=["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
const REGIONS={
 "関東":{venues:["桐生","戸田","江戸川","平和島","多摩川"],color:"var(--r-kanto)"},
 "東海":{venues:["浜名湖","蒲郡","常滑","津"],color:"var(--r-tokai)"},
 "近畿":{venues:["三国","びわこ","住之江","尼崎"],color:"var(--r-kinki)"},
 "四国":{venues:["鳴門","丸亀"],color:"var(--r-shikoku)"},
 "中国":{venues:["児島","宮島","徳山","下関"],color:"var(--r-chugoku)"},
 "九州":{venues:["若松","芦屋","福岡","唐津","大村"],color:"var(--r-kyushu)"}
};
const FEATURED=["椛島健一","高橋貴隆","土谷由美","辻村ゆりな"];

let DATA=[], state={q:"",region:"",sort:"venue",nick:false};

function regionOf(a){ for(const r in REGIONS){ if(a.venues.some(v=>REGIONS[r].venues.includes(v))) return r; } return ""; }
function regionColor(a){ const r=regionOf(a); return r?REGIONS[r].color:"#2a3d52"; }
function venueRank(a){let m=99;a.venues.forEach(v=>{const i=VENUE_ORDER.indexOf(v);if(i>=0&&i<m)m=i});return m}
function isFemale(a){ return ["美生","ゆりな","裕美","美記","尚美","春美","美希","美和","由美","恵","ナツキ"].some(s=>a.name.endsWith(s)); }

function buildRegionChips(){
  const box=document.getElementById('regionFilters');
  box.innerHTML='<span class="chip on" data-region="">全地区</span>'+
    Object.keys(REGIONS).map(r=>`<span class="chip" data-region="${r}">${r}</span>`).join('');
  box.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    box.querySelectorAll('.chip').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor='';});
    c.classList.add('on'); state.region=c.dataset.region;
    if(c.dataset.region){c.style.background=REGIONS[c.dataset.region].color;c.style.borderColor=REGIONS[c.dataset.region].color;}
    render();
  });
}

function renderFeatured(){
  const fs=FEATURED.map(n=>DATA.find(a=>a.name===n)).filter(Boolean);
  if(!fs.length) return;
  document.getElementById('featWrap').style.display='block';
  document.getElementById('featList').innerHTML=fs.map(a=>{
    const yomi=a.yomi?`<span class="fy">${a.yomi}</span>`:'';
    const nick=a.nickname?`<div class="fnick">${a.nickname}</div>`:'';
    const desc=a.note||a.hobby||'';
    return `<div class="feat" onclick="jumpTo('${a.name}')">
      <span class="star">★</span>
      <div class="fn">${a.name}${yomi}</div>${nick}
      <div class="fv">${a.venues.join('・')}</div>
      <div class="fd">${desc}</div>
    </div>`;
  }).join('');
}

function jumpTo(name){
  state.q="";state.region="";state.nick=false;
  document.getElementById('q').value="";
  document.querySelectorAll('#regionFilters .chip').forEach((x,i)=>{x.classList.toggle('on',i===0);x.style.background='';x.style.borderColor='';});
  document.getElementById('nickOnly').classList.remove('on');
  render();
  setTimeout(()=>{
    const el=document.querySelector(`[data-name="${CSS.escape(name)}"]`);
    if(el){el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'center'});}
  },40);
}

function matchRegion(a){ if(!state.region) return true; return a.venues.some(v=>REGIONS[state.region].venues.includes(v)); }
function matchQ(a){ if(!state.q) return true; const q=state.q.toLowerCase(); return [a.name,a.yomi,a.nickname,...(a.venues||[])].join(' ').toLowerCase().includes(q); }

function ageFrom(b){ if(!b) return ""; const d=new Date(b); if(isNaN(d)) return ""; const t=new Date(); let a=t.getFullYear()-d.getFullYear(); const m=t.getMonth()-d.getMonth(); if(m<0||(m===0&&t.getDate()<d.getDate()))a--; return a+"歳"; }
function fmtBirth(b){ if(!b) return ""; const p=b.split('-'); if(p.length<3) return b; return `${+p[1]}月${+p[2]}日`+ (p[0]?`（${p[0]}年）`:''); }
function specsHtml(a){
  const rows=[];
  if(a.birth){ const age=ageFrom(a.birth); rows.push(["生年月日", fmtBirth(a.birth)+(age?` ${age}`:'')]); }
  if(a.hometown) rows.push(["出身", a.hometown]);
  if(a.blood) rows.push(["血液型", a.blood+"型"]);
  if(a.height) rows.push(["身長", a.height]);
  if(a.school) rows.push(["出身校", a.school]);
  if(a.agency) rows.push(["所属", a.agency]);
  if(!rows.length) return "";
  return `<div class="specs">`+rows.map(r=>`<div class="spec"><div class="sl">${r[0]}</div><div class="sv">${r[1]}</div></div>`).join('')+`</div>`;
}

function render(){
  let list=DATA.filter(a=>matchRegion(a)&&matchQ(a)&&(!state.nick||a.nickname));
  if(state.sort==="name") list.sort((a,b)=>(a.yomi||a.name).localeCompare(b.yomi||b.name,'ja'));
  else list.sort((a,b)=>venueRank(a)-venueRank(b)||(a.yomi||a.name).localeCompare(b.yomi||b.name,'ja'));

  document.getElementById('count').textContent=`${list.length}人`;
  const box=document.getElementById('list');
  if(!list.length){box.innerHTML='<div class="empty">該当なし</div>';return}
  box.innerHTML=list.map(a=>{
    const rc=regionColor(a), rz=regionOf(a);
    const fem=isFemale(a)?'<span class="fem">♥</span>':'';
    const nick=a.nickname?`<span class="nick">${a.nickname}</span>`:'';
    const yomi=a.yomi?`<span class="yomi">${a.yomi}</span>`:'';
    const vtags=a.venues.map(v=>`<span class="vtag">${v}</span>`).join('');
    const note=a.note?`<div class="row"><div class="lbl">プロフィール</div>${a.note}</div>`:'';
    const hobby=a.hobby?`<div class="row"><div class="lbl">趣味・人柄</div>${a.hobby}</div>`:'';
    const src=a.source?`<div class="row src"><div class="lbl">出典</div><a href="${a.source}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${a.source}</a></div>`:'';
    const blank=(!note&&!hobby&&!src&&!specsHtml(a))?'<div class="row" style="color:var(--sub)">公開されている確かなプロフィール情報が揃い次第、追記します。</div>':'';
    return `<div class="anc" data-name="${a.name}" style="--rc:${rc}">
      <div class="head" onclick="this.parentNode.classList.toggle('open')">
        <div class="mk">🎙</div>
        <div class="main">
          <div class="nm">${a.name}${fem}${yomi}${nick}</div>
          <div class="vlist">${vtags}</div>
        </div>
        <span class="rzone">${rz}</span>
        <span class="arrow">▶</span>
      </div>
      <div class="body">${specsHtml(a)}${note}${hobby}${src}${blank}</div>
    </div>`;
  }).join('');
}

document.getElementById('q').addEventListener('input',e=>{state.q=e.target.value.trim();render()});
document.querySelectorAll('[data-sort]').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');state.sort=c.dataset.sort;render();
});
document.getElementById('nickOnly').onclick=function(){this.classList.toggle('on');state.nick=this.classList.contains('on');render()};

fetch('announcers.json?v='+Date.now())
  .then(r=>r.json())
  .then(d=>{DATA=d;buildRegionChips();document.querySelector('[data-sort="venue"]').classList.add('on');renderFeatured();render()})
  .catch(()=>{document.getElementById('list').innerHTML='<div class="empty">データを読み込めませんでした</div>'});
</script>
</body>
</html>
